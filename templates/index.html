<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bensalenkkari">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>Bensalenkkari</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --border:#2e2e2e;
  --amber:#f59e0b; --amber-dim:#b45309; --amber-glow:rgba(245,158,11,.12);
  --text:#f0f0f0; --text2:#a0a0a0; --text3:#666;
  --green:#22c55e; --red:#ef4444;
  --r:14px; --rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16.5px;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden}
a{color:var(--amber);text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select{font-family:inherit}
.app{max-width:600px;margin:0 auto;padding-bottom:80px}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--amber)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:-2px}
.lang-btn{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 12px;font-size:13px;color:var(--text2);font-weight:500}

/* Sections */
.sec{padding:24px 20px 0}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}

/* Cards scroll */
.cars-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cars-scroll::-webkit-scrollbar{display:none}
.car-card{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;min-width:160px;cursor:pointer;transition:border-color .15s;position:relative}
.car-card:hover,.car-card:active{border-color:var(--amber);background:var(--amber-glow)}
.car-card-name{font-size:14px;font-weight:700}
.car-card-detail{font-size:13px;color:var(--text2);margin-top:3px}
.car-card-parts{font-size:11px;color:var(--text3);margin-top:4px}
.car-card-del{position:absolute;top:8px;right:8px;color:var(--text3);font-size:18px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.car-card-del:hover{color:var(--red)}
.empty-cars{color:var(--text3);font-size:13px;padding:8px 0}

/* Block */
.block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}

/* Toggle */
.mode-toggle{display:flex;gap:8px;margin-bottom:14px}
.toggle-btn{flex:1;padding:8px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--text3);background:var(--surface2);border:1px solid var(--border);transition:all .15s}
.toggle-btn.active{background:var(--amber-glow);border-color:var(--amber);color:var(--amber)}

/* Inputs */
.row{display:flex;gap:10px;margin-bottom:12px}
.field{flex:1}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:11px 14px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--amber)}
.field input::placeholder{color:var(--text3)}
.field select option{background:var(--surface2)}

/* Buttons */
.btn-primary{width:100%;background:var(--amber);color:#000;font-size:15px;font-weight:600;padding:13px;border-radius:var(--rs);transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* Car result */
.car-result{background:var(--surface);border:1px solid var(--amber);border-radius:var(--r);padding:16px 18px;display:none}
.car-result.show{display:block}
.car-result-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.car-result-detail{font-size:13px;color:var(--text2);margin-top:4px}
.car-extra{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:10px}
.car-field-label{font-size:11px;color:var(--text3)}
.car-field-value{font-size:13px;font-weight:500}
.car-vin{font-size:11px;color:var(--text3);margin-top:8px;font-family:monospace}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:8px}
.badge-high{background:rgba(34,197,94,.15);color:var(--green)}
.badge-low{background:rgba(239,68,68,.15);color:var(--red)}

/* Part search */
.part-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;display:none}
.part-block.show{display:block}
.part-row{display:flex;gap:10px}
.part-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:11px 14px;outline:none;transition:border-color .15s}
.part-row input:focus{border-color:var(--amber)}
.part-row input::placeholder{color:var(--text3)}
.btn-search{background:var(--amber);color:#000;font-size:20px;width:48px;height:48px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.clarify{background:rgba(245,158,11,.1);border:1px solid var(--amber-dim);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--amber);margin-top:12px;display:none}
.clarify.show{display:block}
.recent-parts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.recent-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:border-color .15s}
.recent-chip:hover{border-color:var(--amber);color:var(--amber)}

/* Loading */
.loading-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin:16px 0;display:none}
.loading-bar.show{display:block}
.loading-fill{height:100%;background:var(--amber);animation:ld 2s ease-in-out infinite}
@keyframes ld{0%{width:0;opacity:1}80%{width:90%;opacity:1}100%{width:100%;opacity:0}}
.loading-text{font-size:13px;color:var(--text3);text-align:center;padding:4px 0}

/* Error */
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--red);margin-top:12px;display:none}
.err.show{display:block}

/* Results */
.results{display:none}
.results.show{display:block}

/* Part header */
.part-hdr{padding:20px 20px 0}
.part-hero{display:flex;gap:16px;align-items:flex-start}
.part-img-wrap{width:90px;height:90px;border-radius:var(--rs);background:var(--surface2);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden}
.part-img-wrap img{width:100%;height:100%;object-fit:contain}
.part-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;line-height:1.2}
.part-desc{font-size:14px;color:var(--text2);margin-top:8px;line-height:1.65}
.part-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.meta-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2)}
.meta-chip span{color:var(--text);font-weight:500}

/* Part numbers */
.pn-block{margin:16px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.pn-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.pn-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.pn-row:last-child{border-bottom:none}
.pn-type{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;flex-shrink:0}
.pn-oem{background:rgba(34,197,94,.15);color:var(--green)}
.pn-am{background:rgba(245,158,11,.1);color:var(--amber)}
.pn-num{font-size:14px;font-weight:600;font-family:monospace;flex:1}
.pn-brand{font-size:12px;color:var(--text3)}
.pn-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.pn-copy{font-size:18px;color:var(--text3);padding:4px;border-radius:6px;cursor:pointer}
.pn-copy:hover{color:var(--amber)}
.pn-qual{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(99,102,241,.15);color:#a5b4fc;white-space:nowrap}

/* Tabs */
.tabs-wrap{position:sticky;top:57px;z-index:90;background:var(--bg);padding:0 20px;border-bottom:1px solid var(--border)}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:14px 16px;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}
.tab-panel{display:none;padding:20px}
.tab-panel.active{display:block}

/* Guide */
.tools-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;margin-bottom:20px;display:none}
.tools-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.tools-list{display:flex;flex-wrap:wrap;gap:8px}
.tool-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2)}
.guide-step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.guide-step:last-child{border-bottom:none}
.step-num{width:28px;height:28px;background:var(--amber-glow);border:1px solid var(--amber-dim);border-radius:50%;color:var(--amber);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:15px;line-height:1.7}
.step-icon{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:5px}

/* Prices */
.price-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;text-decoration:none;transition:border-color .15s}
.price-card:hover,.price-card:active{border-color:var(--amber)}
.price-card.best{border-color:var(--amber);background:var(--amber-glow)}
.price-shop{flex:1}
.price-shop-name{font-size:15px;font-weight:600}
.price-ship{font-size:12px;color:var(--text3);margin-top:2px}
.price-part{font-size:12px;color:var(--text2);margin-top:2px}
.price-amt{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--amber);white-space:nowrap}
.price-amt.muted{font-size:13px;color:var(--text3)}
.best-badge{font-size:10px;font-weight:600;background:var(--amber);color:#000;padding:2px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}
.picks-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:0 0 10px}
.pick-card{background:var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;text-decoration:none;border:1.5px solid var(--border);transition:border-color .15s,transform .15s}
.pick-card:hover{transform:translateY(-2px);border-color:var(--amber)}
.pick-card.pick-cheapest{border-color:#22c55e;background:rgba(34,197,94,.06)}
.pick-card.pick-quality{border-color:#818cf8;background:rgba(129,140,248,.06)}
.pick-card.pick-medium{border-color:var(--amber);background:var(--amber-glow)}
.pick-label{font-size:11px;font-weight:700;letter-spacing:.5px;white-space:nowrap;min-width:70px}
.pick-label.lbl-cheapest{color:#22c55e}
.pick-label.lbl-quality{color:#818cf8}
.pick-label.lbl-medium{color:var(--amber)}
.pick-shop{flex:1;min-width:0}
.pick-shop-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-part{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-ship{font-size:11px;color:var(--text3);margin-top:1px}
.pick-price{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:700;white-space:nowrap}
.pick-price.muted{font-size:13px;color:var(--text3)}
.listings-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.price-card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;text-decoration:none;transition:border-color .15s}
.price-card-sm:hover{border-color:var(--amber)}
.price-sm-name{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.price-sm-part{font-size:11px;color:var(--text2)}
.price-sm-price{font-size:14px;font-weight:700;color:var(--amber);white-space:nowrap}
.price-sm-price.muted{color:var(--text3);font-size:12px}

/* Videos */
.video-card{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);text-decoration:none}
.video-card:last-child{border-bottom:none}
.video-thumb{width:80px;height:52px;background:var(--surface2);border-radius:var(--rs);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.video-thumb img{width:100%;height:100%;object-fit:cover}
.video-title{font-size:14px;color:var(--text);line-height:1.5}

/* Diagrams */
.diagram-img{width:100%;border-radius:var(--rs);margin-bottom:12px;display:block;background:var(--surface2)}
.diagram-link{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:10px;text-decoration:none;color:var(--text);font-size:14px;transition:border-color .15s}
.diagram-link:hover{border-color:var(--amber)}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 18px;font-size:13px;z-index:999;transition:transform .25s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:380px){.part-img-wrap{width:72px;height:72px}.part-name{font-size:19px}}

/* ── Skeleton screens ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:6px}
.skel-line{height:14px;margin-bottom:10px}
.skel-line.short{width:40%}
.skel-line.med{width:65%}
.skel-line.full{width:100%}
.skel-img{width:90px;height:90px;border-radius:var(--rs);flex-shrink:0}
.skel-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp .35s ease both}
.fade-in{animation:fadeIn .25s ease both}
.delay-1{animation-delay:.05s}
.delay-2{animation-delay:.1s}
.delay-3{animation-delay:.15s}
.delay-4{animation-delay:.2s}
.delay-5{animation-delay:.25s}

/* Tab panel fade */
.tab-panel.active{animation:fadeIn .2s ease}

/* Card hover lift */
.price-card{transition:border-color .15s,transform .15s,box-shadow .15s}
.price-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.car-card{transition:border-color .15s,background .15s,transform .12s}
.car-card:active{transform:scale(.97)}
.btn-primary{transition:opacity .15s,transform .12s,box-shadow .15s}
.btn-primary:not(:disabled):hover{box-shadow:0 4px 16px rgba(245,158,11,.3)}
.btn-primary:not(:disabled):active{transform:scale(.97)}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--amber);border-radius:var(--rs);z-index:200;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);max-height:180px;overflow-y:auto}
.ac-list.open{display:block}
.ac-item{padding:10px 14px;font-size:14px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:var(--amber-glow);color:var(--amber)}
.field-hint{font-size:11px;margin-top:4px;min-height:16px;padding:0 2px}
.hint-ok{color:#22c55e}
.hint-warn{color:#f59e0b}
.hint-err{color:#ef4444}
.manual-preview{background:var(--amber-glow);border:1px solid var(--amber-dim);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;font-size:14px;font-weight:600;color:var(--amber)}
.diagram-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.diagram-thumb{border-radius:var(--rs);overflow:hidden;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:border-color .15s}
.diagram-thumb:hover,.diagram-thumb:active{border-color:var(--amber)}
.diagram-thumb img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.diagram-thumb-title{font-size:11px;color:var(--text3);padding:5px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.lightbox.open{display:flex}
.lightbox-img{max-width:100%;max-height:78vh;object-fit:contain;border-radius:var(--rs)}
.lightbox-title{color:var(--text2);font-size:12px;margin-top:10px;text-align:center;max-width:90%}
.lightbox-close{position:absolute;top:16px;right:16px;color:#fff;font-size:32px;cursor:pointer;line-height:1}
.lightbox-nav{display:flex;gap:20px;margin-top:14px}
.lightbox-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:22px;padding:8px 22px;cursor:pointer;transition:border-color .15s}
.lightbox-nav button:hover{border-color:var(--amber)}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <div style="display:flex;align-items:center;gap:12px">
    <!-- Mechanic logo SVG -->
    <svg width="52" height="44" viewBox="0 0 52 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- White sedan car body -->
      <rect x="4" y="26" width="40" height="11" rx="3" fill="#e8e8e8"/>
      <!-- Car roof/cabin -->
      <path d="M13 26 Q15 18 22 17 L32 17 Q38 17 40 26Z" fill="#f0f0f0"/>
      <!-- Windows -->
      <path d="M16 25 Q17 20 21 19 L26 19 L26 25Z" fill="#a8d4f0" opacity="0.8"/>
      <path d="M27 25 L27 19 L32 19 Q36 20 37 25Z" fill="#a8d4f0" opacity="0.8"/>
      <!-- Wheels -->
      <circle cx="13" cy="37" r="4.5" fill="#333"/>
      <circle cx="13" cy="37" r="2.5" fill="#888"/>
      <circle cx="35" cy="37" r="4.5" fill="#333"/>
      <circle cx="35" cy="37" r="2.5" fill="#888"/>
      <!-- Door line -->
      <line x1="26" y1="26" x2="26" y2="36" stroke="#ccc" stroke-width="0.8"/>
      <!-- Mechanic body -->
      <rect x="38" y="20" width="10" height="13" rx="3" fill="#f59e0b"/>
      <!-- Mechanic head -->
      <circle cx="43" cy="14" r="5.5" fill="#f5c5a3"/>
      <!-- Hair -->
      <path d="M38 12 Q39 8 43 8 Q47 8 48 12 Q46 10 43 10 Q40 10 38 12Z" fill="#5c3d1e"/>
      <!-- Smile -->
      <path d="M41 16 Q43 18 45 16" stroke="#c0706a" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Eyes -->
      <circle cx="41.5" cy="14" r="0.8" fill="#444"/>

function getStepIcon(text) {
  var low = text.toLowerCase();
  for (var i = 0; i < STEP_KEYWORDS.length; i++) {
    var keywords = STEP_KEYWORDS[i][0];
    var iconKey  = STEP_KEYWORDS[i][1];
    for (var j = 0; j < keywords.length; j++) {
      if (low.includes(keywords[j])) {
        return STEP_ICONS[iconKey];
      }
    }
  }
  return STEP_ICONS.default;
}

// ── Haptic feedback ────────────────────────────────────────────
function haptic(type) {
  if (!navigator.vibrate) return;
  if (type === 'light')   navigator.vibrate(10);
  if (type === 'medium')  navigator.vibrate(25);
  if (type === 'success') navigator.vibrate([10, 50, 10]);
  if (type === 'error')   navigator.vibrate([50, 30, 50]);
}

// ── Pull to refresh ────────────────────────────────────────────
(function() {
  var startY = 0;
  var pulling = false;
  var indicator = document.createElement('div');
  indicator.style.cssText = 'position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--amber);color:#000;padding:8px 20px;border-radius:0 0 20px 20px;font-size:13px;font-weight:600;z-index:500;transition:transform .2s';
  indicator.textContent = 'Päivitä';
  document.body.appendChild(indicator);

  document.addEventListener('touchstart', function(e) {
    if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, {passive: true});

  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dist = e.touches[0].clientY - startY;
    if (dist > 20) indicator.style.transform = 'translateX(-50%) translateY(' + Math.min(dist - 40, 20) + 'px)';
  }, {passive: true});

  document.addEventListener('touchend', function(e) {
    if (!pulling) return;
    var dist = e.changedTouches[0].clientY - startY;
    indicator.style.transform = 'translateX(-50%) translateY(-60px)';
    if (dist > 80) { haptic('medium'); window.location.reload(); }
    pulling = false;
  });
})();

function translatePartToEN(part) {
  var low = part.toLowerCase().trim();
  // Direct match
  if (FI_TO_EN_PARTS[low]) return FI_TO_EN_PARTS[low];
  // Partial match — find longest matching key
  var best = null;
  var bestLen = 0;
  Object.keys(FI_TO_EN_PARTS).forEach(function(key) {
    if (low.includes(key) && key.length > bestLen) {
      best = FI_TO_EN_PARTS[key];
      bestLen = key.length;
    }
  });
  if (best) return best;
  // Try to detect if it's likely Finnish (has ä, ö, or common Finnish patterns)
  // and pass through to AI translation if needed
  return part; // return as-is if no translation found
}

// ── localStorage cars ─────────────────────────────────────────
function getCars() {
  try { return JSON.parse(localStorage.getItem('bl_cars') || '[]'); }
  catch(e) { return []; }
}
function saveCars(cars) {
  localStorage.setItem('bl_cars', JSON.stringify(cars));
}
function upsertCar(car) {
  var cars = getCars().filter(function(c) { return c.vin !== car.vin; });
  cars.unshift(Object.assign({}, car, {saved_at: Date.now()}));
  saveCars(cars.slice(0, 10));
}
function deleteCarByVin(vin) {
  saveCars(getCars().filter(function(c) { return c.vin !== vin; }));
  renderCars();
}
function addRecentPart(vin, part) {
  var cars = getCars();
  var car = cars.find(function(c) { return c.vin === vin; });
  if (car) {
    var parts = (car.recent_parts || []).filter(function(p) { return p !== part; });
    parts.unshift(part);
    car.recent_parts = parts.slice(0, 5);
    saveCars(cars);
  }
}

function renderCars() {
  var cars = getCars();
  var el = document.getElementById('cars-list');
  if (!cars.length) {
    el.innerHTML = '<div class="empty-cars">' + t('lbl-nocars') + '</div>';
    return;
  }
  el.innerHTML = cars.map(function(c) {
    var detail = [c.year, c.engine, c.fuel].filter(Boolean).join(' · ');
    var extra = [c.body, c.transmission].filter(Boolean).join(' · ');
    var parts = c.recent_parts && c.recent_parts.length ? '<div class="car-card-parts">' + c.recent_parts.slice(0,3).join(', ') + '</div>' : '';
    return '<div class="car-card" onclick="loadCar(' + JSON.stringify(c).replace(/"/g,'&quot;') + ')">'
      + '<button class="car-card-del" onclick="event.stopPropagation();deleteCarByVin(\'' + c.vin + '\')">×</button>'
      + '<div class="car-card-name">' + (c.make||'?') + ' ' + (c.model||'') + '</div>'
      + '<div class="car-card-detail">' + detail + '</div>'
      + (extra ? '<div class="car-card-detail">' + extra + '</div>' : '')
      + parts + '<button class="car-card-tune" onclick="event.stopPropagation();openTuning(' + JSON.stringify(c).replace(/"/g,\'&quot;\') + ')">' + (LANG===\'fi\'?\'Viritys\':\'Tuning\') + '</button></div>';
  }).join('');
}

function showToast(msg) {

  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

  document.getElementById('loading-text').textContent = text || '';
}

  var el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('show', !!msg);

function api(path, body) {
  return fetch(path, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  }).then(function(r) {
    return r.json().then(function(data) {
      if (!r.ok) throw new Error(data.error || 'Request failed');
      return data;
    });
  });
}

// ── VIN Lookup ─────────────────────────────────────────────────
function doVinLookup() {
  var vin = document.getElementById('vin-input').value.trim().toUpperCase();
  var country = document.getElementById('country-sel').value;
  if (!vin) { showErr('vin-err', t('err-vin-required')); return; }
  if (vin.length !== 17) { showErr('vin-err', t('err-vin-length')); return; }
  showErr('vin-err', '');
  haptic('light');
  var btn = document.getElementById('btn-lookup');
  btn.disabled = true;
  btn.textContent = t('loading-vin');
  setLoading(true, t('loading-vin'));
  api('/api/lookup-vin', {vin: vin, country: country})
    .then(function(car) {
      currentCar = car;
      upsertCar(car);
      showCarResult(car);
      renderCars();
      haptic('success');
    })
    .catch(function(e) { showErr('vin-err', e.message); haptic('error'); })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = t('btn-lookup');
      setLoading(false);
    });
}

function showAcList(id, items, onSelect) {

  list.innerHTML = items.slice(0,8).map(function(item, i) {

function selectAc(listId, val) {
  var list = document.getElementById(listId);
  list.classList.remove('open');
  if (listId === 'ac-make') {
    document.getElementById('m-make').value = val;
    document.getElementById('m-model').focus();

    acModel(document.getElementById('m-model'));
  } else if (listId === 'ac-model') {
    document.getElementById('m-model').value = val;
    document.getElementById('m-year').focus();
    validateModel(document.getElementById('m-model'));
  }
  updatePreview();

function closeAllAc() {

}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.ac-wrap')) closeAllAc();
});

// ── Make autocomplete ──────────────────────────────────────────
function acMake(input) {
  var val = input.value.trim();
  validateMake(input);
  if (val.length < 1) { closeAllAc(); updatePreview(); return; }
  var matches = MAKES.filter(function(m) {
    return m.toLowerCase().startsWith(val.toLowerCase());
  });
  if (!matches.length) {
    matches = MAKES.filter(function(m) {
      return m.toLowerCase().includes(val.toLowerCase());
    });
  }
  showAcList('ac-make', matches);
  // Auto-fill if exact match
  if (matches.length === 1 && matches[0].toLowerCase() === val.toLowerCase()) {
    document.getElementById('m-make').value = matches[0];
    closeAllAc();
  }
  updatePreview();
}

function validateMake(input) {
  var val = input.value.trim();
  var hint = document.getElementById('hint-make');
  if (!val) { hint.textContent = ''; hint.className = 'field-hint'; return; }
  var exact = MAKES.find(function(m){ return m.toLowerCase() === val.toLowerCase(); });
  if (exact) {
    input.value = exact;
    hint.textContent = 'Tunnettu merkki';
    hint.className = 'field-hint hint-ok';
  } else {
    var close = MAKES.filter(function(m){ return m.toLowerCase().startsWith(val.toLowerCase()); });
    if (close.length) {
      hint.textContent = 'Tarkoititko: ' + close[0] + '?';
      hint.className = 'field-hint hint-warn';
    } else {
      hint.textContent = 'Merkki hyväksytty';
      hint.className = 'field-hint hint-ok';
    }
  }
}

// ── Model autocomplete ─────────────────────────────────────────
function acModel(input) {
  var make = document.getElementById('m-make').value.trim();
  var val = input.value.trim();
  validateModel(input);
  // Find closest make key
  var makeKey = MAKES.find(function(m){ return m.toLowerCase() === make.toLowerCase(); });
  var models = makeKey ? CAR_DB[makeKey] : [];
  if (val.length < 1) { closeAllAc(); updatePreview(); return; }
  var matches = models.filter(function(m){
    return m.toLowerCase().startsWith(val.toLowerCase()) || m.toLowerCase().includes(val.toLowerCase());
  });
  showAcList('ac-model', matches);
  updatePreview();
}

function validateModel(input) {
  var val = input.value.trim();
  var make = document.getElementById('m-make').value.trim();
  var hint = document.getElementById('hint-model');
  if (!val) { hint.textContent = ''; hint.className = 'field-hint'; return; }
  var makeKey = MAKES.find(function(m){ return m.toLowerCase() === make.toLowerCase(); });
  var models = makeKey ? CAR_DB[makeKey] : [];
  var exact = models.find(function(m){ return m.toLowerCase() === val.toLowerCase(); });
  if (exact) {
    hint.textContent = 'Tunnettu malli';
    hint.className = 'field-hint hint-ok';
  } else if (models.length) {
    hint.textContent = 'Malli hyväksytty';
    hint.className = 'field-hint hint-ok';
  } else {
    hint.textContent = '';
    hint.className = 'field-hint';
  }
}

// ── Year validation ────────────────────────────────────────────
function validateYear(input) {
  var val = parseInt(input.value);
  var hint = document.getElementById('hint-year');
  if (!input.value) { hint.textContent = ''; hint.className = 'field-hint'; updatePreview(); return; }
  var now = new Date().getFullYear();
  if (val < 1970 || val > now) {
    hint.textContent = 'Vuosi ' + 1970 + '–' + now;
    hint.className = 'field-hint hint-err';
    input.style.borderColor = 'var(--red)';
  } else if (val < 1990) {
    hint.textContent = 'Vanha auto — varaosien saatavuus voi olla rajattu';
    hint.className = 'field-hint hint-warn';
    input.style.borderColor = '';
  } else {
    hint.textContent = 'Vuosi ok';
    hint.className = 'field-hint hint-ok';
    input.style.borderColor = '';
  }
  updatePreview();
}

// ── Engine validation ──────────────────────────────────────────
function validateEngine(input) {
  var val = input.value.trim();
  var hint = document.getElementById('hint-engine');
  if (!val) { hint.textContent = ''; hint.className = 'field-hint'; updatePreview(); return; }
  // Common engine format: 1.6, 2.3T, 2.0 TDI, 3.0 V6 etc
  var hasDisp = /\d+[.,]\d/.test(val);
  if (hasDisp) {
    hint.textContent = 'Moottori ok';
    hint.className = 'field-hint hint-ok';
  } else if (/^\d+$/.test(val)) {
    hint.textContent = 'Lisää desimaalipiste, esim. ' + val + '.0';
    hint.className = 'field-hint hint-warn';
  } else {
    hint.textContent = '';
    hint.className = 'field-hint';
  }
  updatePreview();
}

function updatePreview() {
  var make  = document.getElementById('m-make').value.trim();
  var model = document.getElementById('m-model').value.trim();
  var year  = document.getElementById('m-year').value.trim();
  var eng   = document.getElementById('m-engine').value.trim();
  var prev  = document.getElementById('manual-preview');
  var txt   = document.getElementById('preview-text');
  if (!make && !model) { prev.style.display = 'none'; return; }
  var parts = [year, make, model, eng].filter(Boolean);
  txt.textContent = parts.join(' ');
  prev.style.display = '';
}

// ── Show car result ────────────────────────────────────────────
function showCarResult(car) {
  document.getElementById('car-name').textContent = (car.make||'') + ' ' + (car.model||'');
  document.getElementById('car-detail').textContent = [car.year, car.engine, car.fuel].filter(Boolean).join(' · ');
  var fields = [
    {k:'field-year',v:car.year},{k:'field-engine',v:car.engine},{k:'field-fuel',v:car.fuel},
    {k:'field-trans',v:car.transmission},{k:'field-body',v:car.body},
    {k:'field-color',v:car.color},{k:'field-muni',v:car.municipality},{k:'field-note',v:car.note}
  ].filter(function(f){ return f.v; });
  document.getElementById('car-extra').innerHTML = fields.map(function(f) {
    return '<div><div class="car-field-label">' + t(f.k) + '</div><div class="car-field-value">' + f.v + '</div></div>';
  }).join('');
  var vin = car.vin || '';
  document.getElementById('car-vin').textContent = vin.startsWith('MANUAL') ? t('manual-entry') : 'VIN: ' + vin;
  var conf = car.confidence || 'low';
  var badge = document.getElementById('car-badge');
  badge.textContent = conf === 'manual' ? t('lbl-manual') : conf.toUpperCase();
  badge.className = 'badge ' + (conf === 'high' || conf === 'manual' ? 'badge-high' : 'badge-low');
  document.getElementById('car-result').classList.add('show');
  document.getElementById('part-block').classList.add('show');
  document.getElementById('results').classList.remove('show');
  showRecentParts(car.recent_parts || []);
}

function loadCar(car) {

  'control arm':'Mikä? (etu-vasen / etu-oikea / taka-vasen / taka-oikea, ylä / ala)',
  'ball joint':'Ylä- vai alahelaniviiin? ' + t('clarify-suffix'),
  'wheel bearing':'Mikä kulma? (etu-vasen / etu-oikea / taka-vasen / taka-oikea)',
  'tie rod':'Kumpi puoli? Sisä vai ulko?',
  'caliper':'Mikä kulma? (etu-vasen / etu-oikea / taka-vasen / taka-oikea)',
  'cv axle':'Kumpi puoli? Vasen vai oikea?',
  'cv joint':'Kumpi puoli? Vasen vai oikea?',
  'headlight':'Kumpi puoli? Vasen vai oikea?',
  'taillight':'Kumpi puoli? Vasen vai oikea?',

  'spring':'Mikä kulma? (etu-vasen / etu-oikea / taka-vasen / taka-oikea)',
  'oxygen sensor':'Kumpi? Ennen katalysaattoria vai jälkeen? Pankki 1 vai 2?',
  'o2 sensor':'Kumpi? Ennen katalysaattoria vai jälkeen?',
  'wiper blade':'Kumpi? Kuljettaja, matkustaja vai taka?',
};
var CLARIFY_SKIP = ['front','rear','left','right','upper','lower','inner','outer','etu','taka','vasen','oikea','ylä','ala'];

function needsClarify(part) {
  var low = part.toLowerCase();
  if (CLARIFY_SKIP.some(function(w){ return low.includes(w); })) return null;
  for (var key in AMBIGUOUS) {
    if (low.includes(key)) return {key: key, q: AMBIGUOUS[key]};
  }
  return null;
}

// ── Part Search ────────────────────────────────────────────────
function doPartSearch() {
  if (!currentCar) { showToast(t('err-vin-required')); return; }
  var part = document.getElementById('part-input').value.trim();
  if (!part) return;

  // Clarification check
  var cl = needsClarify(part);
  if (cl && !clarifyPending) {
    clarifyPending = cl;
    var el = document.getElementById('clarify');
    el.innerHTML = '<strong>📍 ' + cl.q + '</strong><br><small style="color:var(--text3);margin-top:4px;display:block">Lisää tarkennus ja paina haku uudelleen</small>';
    el.classList.add('show');
    return;
  }
  clarifyPending = null;
  document.getElementById('clarify').classList.remove('show');
  runSearch(part);
}

function runSearch(part) {
  haptic('light');
  // Auto-translate Finnish part names to English for better API results
  var partEN = translatePartToEN(part);
  if (partEN !== part) {
    console.log('Translated part: ' + part + ' → ' + partEN);
    part = partEN;
  }

  setLoading(true, t('loading-oem'));
  document.getElementById('results').classList.remove('show');
  document.getElementById('skeleton').style.display = 'block';
  document.getElementById('btn-search').disabled = true;

  // Step 1: get part info
  api('/api/part-info', {part: part, car: currentCar})
    .then(function(info) {
      currentPartInfo = info;
      renderPartHeader(info, part);
      if (currentCar && currentCar.vin) {
        addRecentPart(currentCar.vin, part);
        renderCars();
      }
      setLoading(true, t('loading-all'));
      // Step 2: parallel fetch
      return Promise.all([
        api('/api/prices', {part: part, car: currentCar, part_info: info}).catch(function(){ return []; }),
        api('/api/youtube', {part: part, car: currentCar}).catch(function(){ return []; }),
        api('/api/diagrams', {part: part, car: currentCar}).catch(function(){ return {urls:[]}; }),
        api('/api/part-image', {part: part, car: currentCar}).catch(function(){ return {}; }),
      ]);
    })
    .then(function(results) {
      renderPrices(results[0]);
      renderVideos(results[1]);
      renderDiagrams(results[2], part);
      if (results[3] && results[3].url) setPartImage(results[3].url);
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('results').classList.add('show');
      animateResultsIn();
      haptic('success');
      document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
    })
    .catch(function(e) { showToast('Virhe: ' + e.message); haptic('error'); })
    .finally(function() {
      document.getElementById('skeleton').style.display = 'none';
      setLoading(false);
      document.getElementById('btn-search').disabled = false;
    });
}

// ── Animate results in ────────────────────────────────────────
function animateResultsIn() {
  var els = document.querySelectorAll('.part-hdr, .pn-block, .tabs-wrap, .tab-panel.active');
  els.forEach(function(el, i) {
    el.style.opacity = '0';
    el.style.transform = 'translateY(16px)';
    el.style.transition = 'opacity .3s ease ' + (i * 0.07) + 's, transform .3s ease ' + (i * 0.07) + 's';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      });
    });
  });
}

function renderPrices(prices) {
  var el = document.getElementById('prices-list');
  if (!prices || !prices.length) {
    el.innerHTML = '<div class="empty">' + t('no-prices') + '</div>';
    return;
  }

  var priced = prices.filter(function(p){ return p.price != null; });
  var sorted = priced.slice().sort(function(a,b){ return a.price - b.price; });

  // ── Pick cheapest ──────────────────────────────────────────
  var cheapest = sorted.length ? sorted[0] : null;

  // ── Pick best quality (known quality shops, not cheapest) ──
  var QUALITY_SHOPS = ['autodoc','motonet','ak24','lemforder','lemförder','sachs','monroe','bosch','febi','meyle','skf','trw','gates','brembo','valeo','delphi','continental'];
  var quality = null;
  for (var qi = 0; qi < sorted.length; qi++) {
    var sname = sorted[qi].shop.toLowerCase();
    if (QUALITY_SHOPS.some(function(q){ return sname.includes(q); })) {
      quality = sorted[qi];
      break;
    }
  }
  if (!quality && sorted.length) quality = sorted[Math.min(1, sorted.length-1)];

  // ── Pick happy medium (good quality, reasonable price, not cheapest junk) ──
  // Must be from a reputable shop, price within 20-60% above cheapest
  var medium = null;
  if (cheapest && sorted.length > 2) {
    var minPrice = cheapest.price;
    for (var mi = 0; mi < sorted.length; mi++) {
      var p = sorted[mi];
      var sn = p.shop.toLowerCase();
      var isReputable = QUALITY_SHOPS.some(function(q){ return sn.includes(q); });
      var inRange = p.price >= minPrice * 1.15 && p.price <= minPrice * 1.8;
      if (isReputable && inRange && p !== cheapest && p !== quality) {
        medium = p;
        break;
      }
    }
    // If no reputable shop in range, just take middle of sorted
    if (!medium) medium = sorted[Math.floor(sorted.length / 2)];
  }

  // ── Build picks HTML ──────────────────────────────────────
  function pickCard(cssClass, lblClass, label, p) {
    if (!p) return '';
    var priceStr = '€' + p.price.toFixed(2);
    var ship = (p.shipping && p.shipping !== '—') ? p.shipping : '';
    return '<a href="' + (p.url||'#') + '" target="_blank" rel="noopener" class="pick-card ' + cssClass + '">'
      + '<span class="pick-label ' + lblClass + '">' + label + '</span>'
      + '<div class="pick-shop">'
      + '<div class="pick-shop-name">' + p.shop + '</div>'
      + (p.part ? '<div class="pick-part">' + p.part + '</div>' : '')
      + (ship ? '<div class="pick-ship">' + ship + '</div>' : '')
      + '</div>'
      + '<div class="pick-price">' + priceStr + '</div>'
      + '</a>';
  }

  var picksHtml = '<div class="picks-title">' + (LANG === 'fi' ? 'Parhaat valinnat' : 'Top picks') + '</div>'
    + pickCard('pick-cheapest', 'lbl-cheapest', LANG==='fi'?'Halvin':'Cheapest', cheapest)
    + pickCard('pick-quality',  'lbl-quality',  LANG==='fi'?'Laatu':'Quality',   quality)
    + pickCard('pick-medium',   'lbl-medium',   LANG==='fi'?'Paras vastine':'Best value', medium);

  // ── Compact remaining listings ────────────────────────────
  var shown = [cheapest, quality, medium].filter(Boolean);
  var rest = prices.filter(function(p) {
    return !shown.some(function(s){ return s && s.url === p.url; });
  });

  var restHtml = '';
  if (rest.length) {
    restHtml = '<div class="listings-title">' + (LANG==='fi'?'Kaikki tulokset':'All results') + '</div>'
      + rest.map(function(p) {
          var priceStr = p.price != null ? '€' + p.price.toFixed(2) : t('see-site');
          return '<a href="' + (p.url||'#') + '" target="_blank" rel="noopener" class="price-card-sm">'
            + '<div style="flex:1;min-width:0">'
            + '<div class="price-sm-name">' + p.shop + '</div>'
            + (p.part ? '<div class="price-sm-part">' + p.part + '</div>' : '')
            + '</div>'
            + '<div class="price-sm-price' + (p.price==null?' muted':'') + '">' + priceStr + '</div>'
            + '</a>';
        }).join('');
  }

  el.innerHTML = picksHtml + restHtml;
}

var lightboxImages = [];

function openLightbox(index) {
  lightboxIndex = index;
  updateLightbox();

  document.body.style.overflow = 'hidden';
}

function closeLightboxEl() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length;
  updateLightbox();
}

function updateLightbox() {
  var item = lightboxImages[lightboxIndex];
  if (!item) return;
  document.getElementById('lightbox-img').src = item.url;
  document.getElementById('lightbox-title').textContent = item.title || '';
}

document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightboxEl();
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});

var tuningCar = null;

    .then(function(data) { renderTuning(data); })

function closeTuning() {
  document.getElementById('tuning-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderTuning(data) {
  var body = document.getElementById('tuning-body');
  if (!data || data.error) {
    body.innerHTML = '<div class="empty">' + (data && data.error ? data.error : 'Ei tietoja') + '</div>';
    return;
  }

  var EFFECTS = {
    power:          LANG==='fi'?'Teho':'Power',
    torque:         LANG==='fi'?'Vääntö':'Torque',
    handling:       LANG==='fi'?'Ajettavuus':'Handling',
    fuel_economy:   LANG==='fi'?'Kulutus':'Fuel economy',
    reliability:    LANG==='fi'?'Luotettavuus':'Reliability',
    daily_usability:LANG==='fi'?'Arkikäyttö':'Daily use',
  };

  var CAT_CLASS = {engine:'cat-engine',suspension:'cat-suspension',exhaust:'cat-exhaust',brakes:'cat-brakes'};
  var CAT_LABEL = {
    engine:     LANG==='fi'?'Moottori':'Engine',
    suspension: LANG==='fi'?'Alusta':'Suspension',
    exhaust:    LANG==='fi'?'Pakoputki':'Exhaust',
    brakes:     LANG==='fi'?'Jarrut':'Brakes',
    other:      LANG==='fi'?'Muu':'Other',
  };

  var stockHp  = data.stock_hp  || 0;
  var stockTq  = data.stock_torque || 0;

  var html = '';

  // Stock stats
  if (stockHp || stockTq) {
    html += '<div class="tuning-stock">'
      + (stockHp ? '<div class="tuning-stat"><div class="tuning-stat-val">' + stockHp + ' hp</div><div class="tuning-stat-lbl">' + (LANG==='fi'?'Vakioteho':'Stock power') + '</div></div>' : '')
      + (stockTq ? '<div class="tuning-stat"><div class="tuning-stat-val">' + stockTq + ' Nm</div><div class="tuning-stat-lbl">' + (LANG==='fi'?'Vakiovääntö':'Stock torque') + '</div></div>' : '')
      + '</div>';
  }

  // Summary
  if (data.summary) {
    html += '<div class="tuning-summary">' + data.summary + '</div>';
  }

  // Mods
  (data.mods || []).forEach(function(mod) {
    var cat = mod.category || 'other';
    var catClass = CAT_CLASS[cat] || 'cat-other';
    var catLabel = CAT_LABEL[cat] || cat;
    var worth = mod.worth_score || 0;
    var stars = '';
    for (var s=1;s<=5;s++) stars += '<span class="worth-star' + (s<=worth?'':' empty') + '">★</span>';

    var gainHp  = mod.hp_gain  || 0;
    var gainTq  = mod.torque_gain || 0;
    var hpAfter = mod.hp_after || (stockHp + gainHp);
    var tqAfter = mod.torque_after || (stockTq + gainTq);

    // Effects bars
    var effectsHtml = '<div class="mod-effects">';
    Object.keys(EFFECTS).forEach(function(key) {
      var val = (mod.effects || {})[key];
      if (val === undefined || val === null) return;
      var pct = Math.abs(val) / 5 * 100;
      var isPos = val >= 0;
      var color = isPos ? 'pos' : 'neg';
      effectsHtml += '<div class="effect-row">'
        + '<span class="effect-lbl">' + EFFECTS[key] + '</span>'
        + '<div class="effect-bar-wrap"><div class="effect-bar ' + color + '" style="width:' + pct + '%"></div></div>'
        + '<span class="effect-val" style="color:' + (isPos?'var(--green)':'var(--red)') + '">' + (val>0?'+':'') + val + '</span>'
        + '</div>';
    });
    effectsHtml += '</div>';

    // Requires
    var reqHtml = '';
    if (mod.requires && mod.requires.length) {
      reqHtml = '<div class="mod-notes">⚠ ' + (LANG==='fi'?'Vaatii: ':'Requires: ') + mod.requires.join(', ') + '</div>';
    }

    // Reversible badge
    var revBadge = '<span class="mod-badge">' + (mod.reversible ? (LANG==='fi'?'Palautettavissa':'Reversible') : (LANG==='fi'?'Pysyvä':'Permanent')) + '</span>';
    var diffBadge = '<span class="mod-badge">' + (mod.difficulty||'') + '</span>';

    html += '<div class="mod-card fade-up">'
      + '<div class="mod-header">'
      + '<span class="mod-cat ' + catClass + '">' + catLabel + '</span>'
      + '<div class="mod-name">' + mod.name + '</div>'
      + '<div class="mod-worth">' + stars + '</div>'
      + '</div>'
      + '<div class="mod-desc">' + (mod.description||'') + '</div>'
      + (gainHp || gainTq ? '<div class="mod-gains">'
        + (gainHp ? '<div class="gain-box"><div class="gain-val">+' + gainHp + ' hp</div><div class="gain-lbl">' + (hpAfter ? '→ ' + hpAfter + ' hp' : '') + '</div></div>' : '')
        + (gainTq ? '<div class="gain-box"><div class="gain-val">+' + gainTq + ' Nm</div><div class="gain-lbl">' + (tqAfter ? '→ ' + tqAfter + ' Nm' : '') + '</div></div>' : '')
        + '</div>' : '')
      + effectsHtml
      + '<div class="mod-footer">'
      + '<div><div class="mod-price">~€' + (mod.price_eur||'?') + '</div>'
      + (mod.price_range ? '<div class="mod-price-range">(' + mod.price_range + ' €)</div>' : '')
      + '</div>'
      + revBadge + diffBadge
      + '</div>'
      + (mod.notes ? '<div class="mod-notes">' + mod.notes + '</div>' : '')
      + reqHtml
      + '</div>';
  });

  body.innerHTML = html;
  haptic('success');
}

// ── Init ───────────────────────────────────────────────────────
applyLang();
renderCars();
</script>
</body>
</html>
