<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bensalenkkari">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<title>Bensalenkkari</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0c; --surface:rgba(26,26,30,.88); --surface2:rgba(36,36,42,.92); --border:#2c2c33;
  --amber:#f59e0b; --amber-dim:#b45309; --amber-glow:rgba(245,158,11,.12);
  --text:#f2f2f3; --text2:#a3a3ab; --text3:#6b6b74;
  --green:#22c55e; --red:#ef4444;
  --r:16px; --rs:10px;
}
@supports(backdrop-filter:blur(1px)){
  :root{--surface:rgba(24,24,28,.72); --surface2:rgba(34,34,40,.78)}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16.5px;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden;position:relative}
.bg-scene{position:fixed;inset:0;z-index:-3;width:100%;height:100%;object-fit:cover;opacity:.55}
.bg-photo{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s ease}
.bg-photo.loaded{opacity:.5}
.bg-scrim{position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(10,10,12,.62) 0%,rgba(10,10,12,.85) 45%,rgba(10,10,12,.97) 100%)}
.bg-credit{position:fixed;bottom:6px;right:10px;z-index:-1;font-size:9px;color:rgba(160,160,170,.35);font-family:'Nunito',sans-serif;pointer-events:none}
.block,.car-card,.part-block,.pn-block,.tuning-stock,.mod-card,.cosm-card,.tuning-modal,.car-result{backdrop-filter:blur(14px) saturate(1.1);-webkit-backdrop-filter:blur(14px) saturate(1.1)}

a{color:var(--amber);text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select{font-family:inherit}
.app{max-width:600px;margin:0 auto;padding-bottom:80px;animation:fadeIn .4s ease}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,12,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:var(--amber);letter-spacing:.2px}
.logo-sub{font-size:11px;color:var(--text3);margin-top:-2px}
.lang-btn{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 12px;font-size:13px;color:var(--text2);font-weight:500}

/* Sections */
.sec{padding:24px 20px 0}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}

/* Cards scroll */
.cars-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cars-scroll::-webkit-scrollbar{display:none}
.car-card{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;min-width:168px;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative}
.car-card:hover{border-color:var(--amber-dim);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.35)}
.car-card:active{transform:translateY(0) scale(.98)}
.car-card-name{font-size:14px;font-weight:700}
.car-card-detail{font-size:13px;color:var(--text2);margin-top:3px}
.car-card-parts{font-size:11px;color:var(--text3);margin-top:4px}
.car-card-del{position:absolute;top:8px;right:8px;color:var(--text3);font-size:18px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.car-card-del:hover{color:var(--red)}
.car-card-tune{display:block;width:100%;margin-top:10px;background:var(--amber);color:#000;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:opacity .15s,transform .1s;font-family:inherit}
.car-card-tune:active{opacity:.8;transform:scale(.97)}
.empty-cars{color:var(--text3);font-size:13px;padding:8px 0}

/* Block */
.block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.28)}

/* Toggle */
.mode-toggle{display:flex;gap:8px;margin-bottom:14px}
.toggle-btn{flex:1;padding:9px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;color:var(--text3);background:var(--surface2);border:1px solid var(--border);transition:all .15s}
.toggle-btn.active{background:var(--amber-glow);border-color:var(--amber);color:var(--amber);box-shadow:0 0 0 1px rgba(245,158,11,.15)}
.toggle-btn:active{transform:scale(.97)}

/* Inputs */
.row{display:flex;gap:10px;margin-bottom:12px}
.field{flex:1}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:11px 14px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--amber)}
.field input::placeholder{color:var(--text3)}
.field select option{background:var(--surface2)}

/* Buttons */
.btn-primary{width:100%;background:linear-gradient(180deg,#fbbf24,var(--amber));color:#1a1305;font-size:15px;font-weight:700;padding:13px;border-radius:var(--rs);transition:transform .12s,box-shadow .12s;box-shadow:0 4px 16px rgba(245,158,11,.22),inset 0 1px 0 rgba(255,255,255,.25)}
.btn-primary:active{transform:scale(.985);box-shadow:0 2px 8px rgba(245,158,11,.18)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* Car result */
.car-result{background:var(--surface);border:1px solid var(--amber-dim);border-radius:var(--r);padding:18px 20px;display:none;box-shadow:0 0 0 1px rgba(245,158,11,.08),0 8px 28px rgba(0,0,0,.35)}
.car-result.show{display:block}
.car-result-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.car-result-detail{font-size:13px;color:var(--text2);margin-top:4px}
.car-extra{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:10px}
.car-field-label{font-size:11px;color:var(--text3)}
.car-field-value{font-size:13px;font-weight:500}
.car-vin{font-size:11px;color:var(--text3);margin-top:8px;font-family:monospace}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:8px}
.badge-high{background:rgba(34,197,94,.15);color:var(--green)}
.badge-low{background:rgba(239,68,68,.15);color:var(--red)}

/* Part search */
.part-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.28)}
.part-block.show{display:block}
.part-row{display:flex;gap:10px}
.part-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:11px 14px;outline:none;transition:border-color .15s}
.part-row input:focus{border-color:var(--amber)}
.part-row input::placeholder{color:var(--text3)}
.btn-search{background:linear-gradient(180deg,#fbbf24,var(--amber));color:#1a1305;font-size:20px;width:48px;height:48px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(245,158,11,.25);transition:transform .12s}
.btn-search:active{transform:scale(.92)}
.clarify{background:rgba(245,158,11,.1);border:1px solid var(--amber-dim);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--amber);margin-top:12px;display:none}
.clarify.show{display:block}
.recent-parts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.recent-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:border-color .15s}
.recent-chip:hover{border-color:var(--amber);color:var(--amber)}

/* Loading */
.loading-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin:16px 0;display:none}
.loading-bar.show{display:block}
.loading-fill{height:100%;background:var(--amber);animation:ld 2s ease-in-out infinite}
@keyframes ld{0%{width:0;opacity:1}80%{width:90%;opacity:1}100%{width:100%;opacity:0}}
.loading-text{font-size:13px;color:var(--text3);text-align:center;padding:4px 0}

/* Error */
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--red);margin-top:12px;display:none}
.err.show{display:block}

/* Results */
.results{display:none}
.results.show{display:block}

/* Part header */
.part-hdr{padding:20px 20px 0}
.part-hero{display:flex;gap:16px;align-items:flex-start}
.part-img-wrap{width:90px;height:90px;border-radius:var(--rs);background:var(--surface2);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden}
.part-img-wrap img{width:100%;height:100%;object-fit:contain}
.part-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;line-height:1.2}
.part-desc{font-size:14px;color:var(--text2);margin-top:8px;line-height:1.65}
.part-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.meta-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2)}
.meta-chip span{color:var(--text);font-weight:500}

/* Part numbers */
.pn-block{margin:16px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.pn-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.pn-copyall{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:5px;transition:border-color .15s,color .15s}
.pn-copyall:hover{border-color:var(--amber);color:var(--amber)}
.pn-copyall:active{transform:scale(.95)}
.pn-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.pn-row:last-child{border-bottom:none}
.pn-type{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;flex-shrink:0}
.pn-oem{background:rgba(34,197,94,.15);color:var(--green)}
.pn-am{background:rgba(245,158,11,.1);color:var(--amber)}
.pn-num{font-size:14px;font-weight:600;font-family:monospace;flex:1}
.pn-brand{font-size:12px;color:var(--text3)}
.pn-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.pn-copy{font-size:18px;color:var(--text3);padding:4px;border-radius:6px;cursor:pointer}
.pn-copy:hover{color:var(--amber)}
.pn-qual{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(99,102,241,.15);color:#a5b4fc;white-space:nowrap}

/* Tabs */
.tabs-wrap{position:sticky;top:57px;z-index:90;background:rgba(10,10,12,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:0 20px;border-bottom:1px solid var(--border)}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:14px 16px;font-size:13px;font-weight:600;color:var(--text3);border-bottom:2.5px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;letter-spacing:.2px}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}
.tab-btn:active{opacity:.7}
.tab-panel{display:none;padding:20px}
.tab-panel.active{display:block}

/* Guide */
.tools-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;margin-bottom:20px;display:none}
.tools-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.tools-list{display:flex;flex-wrap:wrap;gap:8px}
.tool-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2)}
.guide-step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.guide-step:last-child{border-bottom:none}
.step-num{width:28px;height:28px;background:var(--amber-glow);border:1px solid var(--amber-dim);border-radius:50%;color:var(--amber);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-num{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.torque-spec{background:var(--amber-glow);color:var(--amber);font-weight:700;padding:1px 7px;border-radius:6px;white-space:nowrap;border:1px solid rgba(245,158,11,.25)}
.step-text{font-size:15px;line-height:1.7}
.step-icon{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:5px}

/* Prices */
.price-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;text-decoration:none;transition:border-color .15s}
.price-card:hover,.price-card:active{border-color:var(--amber)}
.price-card.best{border-color:var(--amber);background:var(--amber-glow)}
.price-shop{flex:1}
.price-shop-name{font-size:15px;font-weight:600}
.price-ship{font-size:12px;color:var(--text3);margin-top:2px}
.price-part{font-size:12px;color:var(--text2);margin-top:2px}
.price-amt{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--amber);white-space:nowrap}
.price-amt.muted{font-size:13px;color:var(--text3)}
.best-badge{font-size:10px;font-weight:600;background:var(--amber);color:#000;padding:2px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}
.picks-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:0 0 10px}
.pick-card{background:var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;text-decoration:none;border:1.5px solid var(--border);transition:border-color .15s,transform .15s}
.pick-card:hover{transform:translateY(-2px);border-color:var(--amber)}
.pick-card.pick-cheapest{border-color:#22c55e;background:rgba(34,197,94,.06)}
.pick-card.pick-quality{border-color:#818cf8;background:rgba(129,140,248,.06)}
.pick-card.pick-medium{border-color:var(--amber);background:var(--amber-glow)}
.pick-label{font-size:11px;font-weight:700;letter-spacing:.5px;white-space:nowrap;min-width:70px}
.pick-label.lbl-cheapest{color:#22c55e}
.pick-label.lbl-quality{color:#818cf8}
.pick-label.lbl-medium{color:var(--amber)}
.pick-shop{flex:1;min-width:0}
.pick-shop-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-part{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-ship{font-size:11px;color:var(--text3);margin-top:1px}
.pick-price{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:700;white-space:nowrap}
.pick-price.muted{font-size:13px;color:var(--text3)}
.listings-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.price-card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;text-decoration:none;transition:border-color .15s}
.price-card-sm:hover{border-color:var(--amber)}
.price-sm-name{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.price-sm-part{font-size:11px;color:var(--text2)}
.price-sm-price{font-size:14px;font-weight:700;color:var(--amber);white-space:nowrap}
.price-sm-price.muted{color:var(--text3);font-size:12px}

/* Videos */
.video-card{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);text-decoration:none}
.video-card:last-child{border-bottom:none}
.video-thumb{width:80px;height:52px;background:var(--surface2);border-radius:var(--rs);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.video-thumb img{width:100%;height:100%;object-fit:cover}
.video-title{font-size:14px;color:var(--text);line-height:1.5}

/* Diagrams */
.diagram-img{width:100%;border-radius:var(--rs);margin-bottom:12px;display:block;background:var(--surface2)}
.diagram-link{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:10px;text-decoration:none;color:var(--text);font-size:14px;transition:border-color .15s}
.diagram-link:hover{border-color:var(--amber)}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 18px;font-size:13px;z-index:999;transition:transform .25s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:380px){.part-img-wrap{width:72px;height:72px}.part-name{font-size:19px}}

/* ── Tuning modal ─────────────────────────────────────────── */
.tuning-modal{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;background:rgba(10,10,12,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tuning-modal.open{display:flex}
.tuning-hdr{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.tuning-hdr h2{font-family:"Space Grotesk",sans-serif;font-size:17px;font-weight:700;flex:1;margin:0}
.tuning-close{font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;padding:6px 12px;border-radius:8px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border)}
.tuning-close:hover{color:var(--amber);border-color:var(--amber)}
.tuning-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.tuning-tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tuning-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.tuning-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.tuning-overview{padding:16px 20px 0;flex-shrink:0}
.tuning-stock{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;display:flex;gap:20px}
.tuning-stat{text-align:center;flex:1}
.tuning-stat-val{font-family:"Space Grotesk",sans-serif;font-size:26px;font-weight:700;color:var(--amber)}
.tuning-stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.tuning-summary{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.tuning-loading{text-align:center;padding:60px 20px;color:var(--text3)}
.tuning-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
.tuning-level{margin-bottom:24px}
.level-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:14px 16px;border-radius:var(--r);border:1.5px solid var(--border)}
.level-header.lv1{border-color:#22c55e;background:rgba(34,197,94,.06)}
.level-header.lv2{border-color:#f59e0b;background:rgba(245,158,11,.06)}
.level-header.lv3{border-color:#ef4444;background:rgba(239,68,68,.06)}
.level-badge{font-size:20px;font-weight:900;font-family:"Space Grotesk",sans-serif;width:36px;text-align:center;flex-shrink:0}

.lv2 .level-badge{color:#f59e0b}

.lv2 .level-hp{color:#f59e0b}
.lv3 .level-hp{color:#ef4444}

.mod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.mod-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.mod-cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0;margin-top:3px}

.cat-suspension{background:rgba(99,102,241,.15);color:#a5b4fc}

.mod-name{font-size:15px;font-weight:700;flex:1}
.mod-worth{display:flex;gap:2px;margin-left:auto;flex-shrink:0}
.worth-star{font-size:13px;color:var(--amber)}
.worth-star.empty{color:var(--border)}
.mod-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.mod-gains{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.gain-box{background:var(--surface2);border-radius:var(--rs);padding:10px;text-align:center}
.gain-val{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:700;color:#22c55e}
.mod-effects{margin-bottom:10px}
.effect-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.effect-lbl{font-size:12px;color:var(--text2);width:100px;flex-shrink:0}
.effect-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px}
.effect-bar{height:100%;border-radius:3px}
.effect-bar.pos{background:var(--green)}
.effect-bar.neg{background:var(--red)}
.effect-val{font-size:11px;font-weight:600;width:24px;text-align:right;flex-shrink:0}
.mod-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mod-price{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:700;color:var(--amber)}

.mod-search-btn:hover,.mod-search-btn:active{background:var(--amber);color:#000}
.cosm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}

.cosm-info{flex:1;min-width:0}

.cosm-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.cosm-effect{font-size:11px;color:var(--amber);margin-top:4px}
.cosm-brands{font-size:11px;color:var(--text3);margin-top:3px}
.cosm-right{text-align:right;flex-shrink:0}

.cosm-range{font-size:10px;color:var(--text3);margin-top:1px}
.cosm-worth{display:flex;justify-content:flex-end;gap:1px;margin-top:4px}

/* ── Skeleton screens ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:6px}
.skel-line{height:14px;margin-bottom:10px}
.skel-line.short{width:40%}
.skel-line.med{width:65%}
.skel-line.full{width:100%}
.skel-img{width:90px;height:90px;border-radius:var(--rs);flex-shrink:0}
.skel-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp .35s ease both}
.fade-in{animation:fadeIn .25s ease both}
.delay-1{animation-delay:.05s}
.delay-2{animation-delay:.1s}
.delay-3{animation-delay:.15s}
.delay-4{animation-delay:.2s}
.delay-5{animation-delay:.25s}

/* Tab panel fade */
.tab-panel.active{animation:fadeIn .2s ease}

/* Card hover lift */
.price-card{transition:border-color .15s,transform .15s,box-shadow .15s}
.price-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.car-card{transition:border-color .15s,background .15s,transform .12s}
.car-card:active{transform:scale(.97)}
.btn-primary{transition:opacity .15s,transform .12s,box-shadow .15s}
.btn-primary:not(:disabled):hover{box-shadow:0 4px 16px rgba(245,158,11,.3)}
.btn-primary:not(:disabled):active{transform:scale(.97)}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--amber);border-radius:var(--rs);z-index:200;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);max-height:180px;overflow-y:auto}
.ac-list.open{display:block}
.ac-item{padding:10px 14px;font-size:14px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:var(--amber-glow);color:var(--amber)}
.field-hint{font-size:11px;margin-top:4px;min-height:16px;padding:0 2px}
.hint-ok{color:#22c55e}
.hint-warn{color:#f59e0b}
.hint-err{color:#ef4444}
.manual-preview{background:var(--amber-glow);border:1px solid var(--amber-dim);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;font-size:14px;font-weight:600;color:var(--amber)}
.diagram-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.diagram-thumb{border-radius:var(--rs);overflow:hidden;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:border-color .15s}
.diagram-thumb:hover,.diagram-thumb:active{border-color:var(--amber)}
.diagram-thumb img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.diagram-thumb-title{font-size:11px;color:var(--text3);padding:5px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.lightbox.open{display:flex}
.lightbox-img{max-width:100%;max-height:78vh;object-fit:contain;border-radius:var(--rs);cursor:zoom-in;touch-action:none;user-select:none;-webkit-user-drag:none;transition:transform .15s ease}
.lightbox-img.dragging{transition:none}
.lightbox-zoom-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text3);background:rgba(0,0,0,.5);padding:5px 12px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s}
.lightbox.open .lightbox-zoom-hint{opacity:1}
.lightbox-title{color:var(--text2);font-size:12px;margin-top:10px;text-align:center;max-width:90%}
.lightbox-close{position:absolute;top:16px;right:16px;color:#fff;font-size:32px;cursor:pointer;line-height:1}
.lightbox-nav{display:flex;gap:20px;margin-top:14px}
.lightbox-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:22px;padding:8px 22px;cursor:pointer;transition:border-color .15s}
.lightbox-nav button:hover{border-color:var(--amber)}
</style>

// ── Haptic feedback ────────────────────────────────────────────
function haptic(type) {
  if (!navigator.vibrate) return;
  if (type === 'light')   navigator.vibrate(10);
  if (type === 'medium')  navigator.vibrate(25);
  if (type === 'success') navigator.vibrate([10, 50, 10]);
  if (type === 'error')   navigator.vibrate([50, 30, 50]);
}

// ── Pull to refresh ────────────────────────────────────────────
(function() {
  var startY = 0;
  var pulling = false;
  var indicator = document.createElement('div');
  indicator.style.cssText = 'position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--amber);color:#000;padding:8px 20px;border-radius:0 0 20px 20px;font-size:13px;font-weight:600;z-index:500;transition:transform .2s';
  indicator.textContent = 'Päivitä';
  document.body.appendChild(indicator);

  document.addEventListener('touchstart', function(e) {
    if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, {passive: true});

  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dist = e.touches[0].clientY - startY;
    if (dist > 20) indicator.style.transform = 'translateX(-50%) translateY(' + Math.min(dist - 40, 20) + 'px)';
  }, {passive: true});

  document.addEventListener('touchend', function(e) {
    if (!pulling) return;
    var dist = e.changedTouches[0].clientY - startY;
    indicator.style.transform = 'translateX(-50%) translateY(-60px)';
    if (dist > 80) { haptic('medium'); window.location.reload(); }
    pulling = false;
  });
})();

function translatePartToEN(part) {
  var low = part.toLowerCase().trim();
  // Direct match
  if (FI_TO_EN_PARTS[low]) return FI_TO_EN_PARTS[low];
  // Partial match — find longest matching key
  var best = null;
  var bestLen = 0;
  Object.keys(FI_TO_EN_PARTS).forEach(function(key) {
    if (low.includes(key) && key.length > bestLen) {
      best = FI_TO_EN_PARTS[key];
      bestLen = key.length;
    }
  });
  if (best) return best;
  // Try to detect if it's likely Finnish (has ä, ö, or common Finnish patterns)
  // and pass through to AI translation if needed
  return part; // return as-is if no translation found
}

// ── localStorage cars ─────────────────────────────────────────
function getCars() {
  try { return JSON.parse(localStorage.getItem('bl_cars') || '[]'); }
  catch(e) { return []; }
}
function saveCars(cars) {
  localStorage.setItem('bl_cars', JSON.stringify(cars));
}
function upsertCar(car) {
  var cars = getCars().filter(function(c) { return c.vin !== car.vin; });
  cars.unshift(Object.assign({}, car, {saved_at: Date.now()}));
  saveCars(cars.slice(0, 10));
}
function deleteCarByVin(vin) {
  saveCars(getCars().filter(function(c) { return c.vin !== vin; }));
  renderCars();
}
function addRecentPart(vin, part) {
  var cars = getCars();
  var car = cars.find(function(c) { return c.vin === vin; });
  if (car) {
    var parts = (car.recent_parts || []).filter(function(p) { return p !== part; });
    parts.unshift(part);
    car.recent_parts = parts.slice(0, 5);
    saveCars(cars);
  }
}

function renderCars() {
  var cars = getCars();
  var el = document.getElementById('cars-list');
  if (!cars.length) {
    el.innerHTML = '<div class="empty-cars">' + t('lbl-nocars') + '</div>';
    return;
  }
  el.innerHTML = cars.map(function(c) {
    var detail = [c.year, c.engine, c.fuel].filter(Boolean).join(' · ');
    var extra = [c.body, c.transmission].filter(Boolean).join(' · ');
    var parts = c.recent_parts && c.recent_parts.length ? '<div class="car-card-parts">' + c.recent_parts.slice(0,3).join(', ') + '</div>' : '';
    return '<div class="car-card" onclick="loadCar(' + JSON.stringify(c).replace(/"/g,'&quot;') + ')">'
      + '<button class="car-card-del" onclick="event.stopPropagation();deleteCarByVin(\'' + c.vin + '\')">×</button>'
      + '<div class="car-card-name">' + (c.make||'?') + ' ' + (c.model||'') + '</div>'
      + '<div class="car-card-detail">' + detail + '</div>'
      + (extra ? '<div class="car-card-detail">' + extra + '</div>' : '')
      + parts
      + parts
      + '<button class="car-card-tune" onclick="event.stopPropagation();openTuningByVin(\'' + (c.vin||'').replace(/'/g,'') + '\')">'
      + (LANG==='fi'?'Viritys':'Tuning')
      + '</button></div>';
      + '</div>';
  }).join('');
}

function api(path, body) {
  return fetch(path, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  }).then(function(r) {
    return r.json().then(function(data) {
      if (!r.ok) throw new Error(data.error || 'Request failed');
      return data;
    });
  });
}

function doVinLookup() {

  if (!vin) { showErr('vin-err', t('err-vin-required')); return; }

  haptic('light');

  setLoading(true, t('loading-vin'));

// ── Make autocomplete ──────────────────────────────────────────
function acMake(input) {
  var val = input.value.trim();
  validateMake(input);
  if (val.length < 1) { closeAllAc(); updatePreview(); return; }
  var matches = MAKES.filter(function(m) {
    return m.toLowerCase().startsWith(val.toLowerCase());
  });
  if (!matches.length) {
    matches = MAKES.filter(function(m) {
      return m.toLowerCase().includes(val.toLowerCase());
    });
  }
  showAcList('ac-make', matches);
  // Auto-fill if exact match
  if (matches.length === 1 && matches[0].toLowerCase() === val.toLowerCase()) {
    document.getElementById('m-make').value = matches[0];
    closeAllAc();
  }
  updatePreview();
}

function validateMake(input) {
  var val = input.value.trim();
  var hint = document.getElementById('hint-make');
  if (!val) { hint.textContent = ''; hint.className = 'field-hint'; return; }
  var exact = MAKES.find(function(m){ return m.toLowerCase() === val.toLowerCase(); });
  if (exact) {
    input.value = exact;
    hint.textContent = t('hint-make-ok');
    hint.className = 'field-hint hint-ok';
  } else {
    var close = MAKES.filter(function(m){ return m.toLowerCase().startsWith(val.toLowerCase()); });
    if (close.length) {
      hint.textContent = t('hint-make-suggest') + close[0] + '?';
      hint.className = 'field-hint hint-warn';
    } else {
      hint.textContent = t('hint-make-acc');
      hint.className = 'field-hint hint-ok';
    }
  }
}

// ── Model autocomplete ─────────────────────────────────────────
function acModel(input) {
  var make = document.getElementById('m-make').value.trim();
  var val = input.value.trim();
  validateModel(input);
  // Find closest make key
  var makeKey = MAKES.find(function(m){ return m.toLowerCase() === make.toLowerCase(); });
  var models = makeKey ? CAR_DB[makeKey] : [];
  if (val.length < 1) { closeAllAc(); updatePreview(); return; }
  var matches = models.filter(function(m){
    return m.toLowerCase().startsWith(val.toLowerCase()) || m.toLowerCase().includes(val.toLowerCase());
  });
  showAcList('ac-model', matches);
  updatePreview();
}

function validateModel(input) {
  var val = input.value.trim();
  var make = document.getElementById('m-make').value.trim();
  var hint = document.getElementById('hint-model');
  if (!val) { hint.textContent = ''; hint.className = 'field-hint'; return; }
  var makeKey = MAKES.find(function(m){ return m.toLowerCase() === make.toLowerCase(); });
  var models = makeKey ? CAR_DB[makeKey] : [];
  var exact = models.find(function(m){ return m.toLowerCase() === val.toLowerCase(); });
  if (exact) {
    hint.textContent = t('hint-model-ok');
    hint.className = 'field-hint hint-ok';
  } else if (models.length) {
    hint.textContent = t('hint-model-acc');
    hint.className = 'field-hint hint-ok';
  } else {
    hint.textContent = '';
    hint.className = 'field-hint';
  }
}

// ── Year validation ────────────────────────────────────────────
function validateYear(input) {
  var val = parseInt(input.value);
  var hint = document.getElementById('hint-year');
  if (!input.value) { hint.textContent = ''; hint.className = 'field-hint'; updatePreview(); return; }
  var now = new Date().getFullYear();
  if (val < 1970 || val > now) {
    hint.textContent = t('hint-year-bad') + now;
    hint.className = 'field-hint hint-err';
    input.style.borderColor = 'var(--red)';
  } else if (val < 1990) {
    hint.textContent = t('hint-year-old');
    hint.className = 'field-hint hint-warn';
    input.style.borderColor = '';
  } else {
    hint.textContent = t('hint-year-ok');
    hint.className = 'field-hint hint-ok';
    input.style.borderColor = '';
  }
  updatePreview();
}

// ── Engine validation ──────────────────────────────────────────
function validateEngine(input) {
  var val = input.value.trim();
  var hint = document.getElementById('hint-engine');
  if (!val) { hint.textContent = ''; hint.className = 'field-hint'; updatePreview(); return; }
  // Common engine format: 1.6, 2.3T, 2.0 TDI, 3.0 V6 etc
  var hasDisp = /\d+[.,]\d/.test(val);
  if (hasDisp) {
    hint.textContent = t('hint-engine-ok');
    hint.className = 'field-hint hint-ok';
  } else if (/^\d+$/.test(val)) {
    hint.textContent = t('hint-engine-dec') + val + '.0';
    hint.className = 'field-hint hint-warn';
  } else {
    hint.textContent = '';
    hint.className = 'field-hint';
  }
  updatePreview();
}

var CLARIFY_SKIP = ['front','rear','left','right','upper','lower','inner','outer','etu','taka','vasen','oikea','ylä','ala'];

function needsClarify(part) {
  var low = part.toLowerCase();
  if (CLARIFY_SKIP.some(function(w){ return low.includes(w); })) return null;
  for (var key in AMBIGUOUS) {
    if (low.includes(key)) return {key: key, q: AMBIGUOUS[key]};
  }
  return null;
}

// ── Part Search ────────────────────────────────────────────────
function doPartSearch() {
  if (!currentCar) { showToast(t('err-vin-required')); return; }
  var part = document.getElementById('part-input').value.trim();
  if (!part) return;

  // Clarification check
  var cl = needsClarify(part);
  if (cl && !clarifyPending) {
    clarifyPending = cl;
    var el = document.getElementById('clarify');
    el.innerHTML = '<strong>📍 ' + cl.q + '</strong><br><small style="color:var(--text3);margin-top:4px;display:block">Lisää tarkennus ja paina haku uudelleen</small>';
    el.classList.add('show');
    return;
  }
  clarifyPending = null;
  document.getElementById('clarify').classList.remove('show');
  runSearch(part);
}

function runSearch(part) {
  haptic('light');
  // Auto-translate Finnish part names to English for better API results
  var partEN = translatePartToEN(part);
  if (partEN !== part) {
    console.log('Translated part: ' + part + ' → ' + partEN);
    part = partEN;
  }

  setLoading(true, t('loading-oem'));
  document.getElementById('results').classList.remove('show');
  document.getElementById('skeleton').style.display = 'block';
  document.getElementById('btn-search').disabled = true;

  // Step 1: get part info (check 7-day localStorage cache first)
  var _piKey = 'pi:v2:' + (currentCar ? (currentCar.vin||currentCar.make+currentCar.model) : '') + ':' + LANG + ':' + part.toLowerCase().trim();
  var _piCached = null;
  try {
    var _piRaw = localStorage.getItem(_piKey);
    if (_piRaw) {
      var _piParsed = JSON.parse(_piRaw);
      if (_piParsed.ts && (Date.now() - _piParsed.ts) < 604800000) { // 7 days
        _piCached = _piParsed.data;
      } else {
        localStorage.removeItem(_piKey);
      }
    }
  } catch(e) {}

  (_piCached ? Promise.resolve(_piCached) : api('/api/part-info', {part: part, car: currentCar, lang: LANG}).then(function(info){
      try { localStorage.setItem(_piKey, JSON.stringify({ts: Date.now(), data: info})); } catch(e) {}
      return info;
    }))
    .then(function(info) {
      currentPartInfo = info;
      renderPartHeader(info, part);
      if (currentCar && currentCar.vin) {
        addRecentPart(currentCar.vin, part);
        renderCars();
      }
      setLoading(true, t('loading-all'));
      // Step 2: parallel fetch
      return Promise.all([
        api('/api/prices', {part: part, car: currentCar, part_info: info}).catch(function(){ return []; }),
        api('/api/youtube', {part: part, car: currentCar}).catch(function(){ return []; }),
        api('/api/diagrams', {part: part, car: currentCar}).catch(function(){ return {urls:[]}; }),
        api('/api/part-image', {part: part, car: currentCar}).catch(function(){ return {}; }),
      ]);
    })
    .then(function(results) {
      renderPrices(results[0]);
      renderVideos(results[1]);
      renderDiagrams(results[2], part);
      if (results[3] && results[3].url) setPartImage(results[3].url);
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('results').classList.add('show');
      animateResultsIn();
      haptic('success');
      setTimeout(function(){ document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
    })
    .catch(function(e) { showToast('Virhe: ' + e.message); haptic('error'); })
    .finally(function() {
      document.getElementById('skeleton').style.display = 'none';
      setLoading(false);
      document.getElementById('btn-search').disabled = false;
    });
}

function highlightTorque(text) {
  if (!text) return text;
  // Escape any incidental HTML first (defensive — AI text is plain but just in case)
  var escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Match torque specs: "35 Nm", "35-40 Nm", "35,5 Nm", "35.5Nm", case-insensitive
  return escaped.replace(/(\d+(?:[.,]\d+)?(?:\s*[-–]\s*\d+(?:[.,]\d+)?)?\s*N\s?m)\b/gi, '<span class="torque-spec">$1</span>');
}

function renderPartHeader(info, rawPart) {
  document.getElementById('res-name').textContent = info.canonical_name || rawPart;
  document.getElementById('res-desc').textContent = info.description || '';
  var meta = '';
  if (info.difficulty) meta += '<span class="meta-chip"><span>' + info.difficulty + '</span></span>';
  if (info.avg_labor_hours) meta += '<span class="meta-chip"><span>' + info.avg_labor_hours + '</span></span>';
  document.getElementById('res-meta').innerHTML = meta;

  // Part numbers
  var nums = info.part_numbers || [];
  var pnBlock = document.getElementById('pn-block');
  if (nums.length) {
    var pnHtml = nums.map(function(p) {
      var num   = typeof p === 'object' ? p.number  : p;
      var brand = typeof p === 'object' ? (p.brand  || '') : '';
      var type  = typeof p === 'object' ? (p.type   || 'OEM') : 'OEM';
      var qual  = typeof p === 'object' ? (p.quality || '') : '';
      var isOEM = type.toUpperCase().includes('OEM');
      var qualBadge = qual ? '<span class="pn-qual">' + qual + '</span>' : '';
      return '<div class="pn-row">'
        + '<span class="pn-type ' + (isOEM ? 'pn-oem' : 'pn-am') + '">' + type + '</span>'
        + '<span class="pn-num">' + num + '</span>'
        + '<div class="pn-right"><span class="pn-brand">' + brand + '</span>'
        + qualBadge
        + '<span class="pn-copy" onclick="copyNum(\'' + num + '\')" title="Kopioi">⧉</span></div>'
        + '</div>';
    }).join('');
    if (info.oem_note) {
      pnHtml += '<p style="font-size:12px;color:var(--text3);margin-top:10px;line-height:1.5">' + info.oem_note + '</p>';
    }
    document.getElementById('pn-list').innerHTML = pnHtml;
    pnBlock.style.display = '';
  } else {
    pnBlock.style.display = 'none';
  }

  // Tools
  var tools = info.tools_needed || [];
  var toolsBox = document.getElementById('tools-box');
  if (tools.length) {
    document.getElementById('tools-list').innerHTML = tools.map(function(t) {
      return '<span class="tool-chip">' + t + '</span>';
    }).join('');
    toolsBox.style.display = '';
  } else { toolsBox.style.display = 'none'; }

  // Guide with step icons — robust to however the AI formatted the steps
  var rawGuide = (info.replacement_summary || '').trim();
  var stepLines = [];
  if (rawGuide) {
    // First try splitting on real newlines
    var lineCandidates = rawGuide.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
    var numberedLines = lineCandidates.filter(function(l){ return /^\d+[.)]\s*/.test(l); });
    if (numberedLines.length >= 2) {
      // Newlines worked and most lines are numbered steps — use as-is
      stepLines = lineCandidates;
    } else {
      // No usable newlines (AI wrote one continuous paragraph) — split right
      // before each "N. " or "N) " occurrence instead, wherever it appears.
      var split = rawGuide.split(/(?=\d+[.)]\s)/).map(function(l){ return l.trim(); }).filter(Boolean);
      stepLines = split.length >= 2 ? split : [rawGuide];
    }
  }
  document.getElementById('guide-steps').innerHTML = stepLines.length ? stepLines.map(function(line) {
    var m = line.match(/^(\d+)[.)]\s*(.*)/);
    if (m) return '<div class="guide-step"><div class="step-icon">' + getStepIcon(m[2]) + '</div><div style="flex:1"><div class="step-num">' + (LANG==='fi'?'Vaihe ':'Step ') + m[1] + '</div><div class="step-text">' + highlightTorque(m[2]) + '</div></div></div>';
    return '<div class="guide-step" style="padding-left:52px"><div class="step-text" style="color:var(--text2)">' + highlightTorque(line.trim()) + '</div></div>';
  }).join('') : '<div class="empty">' + (LANG==='fi'?'Ei ohjetta saatavilla':'No guide available') + '</div>';

  // Reset to guide tab
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab==='guide'); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id==='tab-guide'); });
}

function renderPrices(prices) {
  var el = document.getElementById('prices-list');
  if (!prices || !prices.length) {
    el.innerHTML = '<div class="empty">' + t('no-prices') + '</div>';
    return;
  }

  var priced = prices.filter(function(p){ return p.price != null; });
  var sorted = priced.slice().sort(function(a,b){ return a.price - b.price; });

  // ── Pick cheapest ──────────────────────────────────────────
  var cheapest = sorted.length ? sorted[0] : null;

  // ── Pick best quality (known quality shops, not cheapest) ──
  var QUALITY_SHOPS = ['autodoc','motonet','ak24','lemforder','lemförder','sachs','monroe','bosch','febi','meyle','skf','trw','gates','brembo','valeo','delphi','continental'];
  var quality = null;
  for (var qi = 0; qi < sorted.length; qi++) {
    var sname = sorted[qi].shop.toLowerCase();
    if (QUALITY_SHOPS.some(function(q){ return sname.includes(q); })) {
      quality = sorted[qi];
      break;
    }
  }
  if (!quality && sorted.length) quality = sorted[Math.min(1, sorted.length-1)];

  // ── Pick happy medium (good quality, reasonable price, not cheapest junk) ──
  // Must be from a reputable shop, price within 20-60% above cheapest
  var medium = null;
  if (cheapest && sorted.length > 2) {
    var minPrice = cheapest.price;
    for (var mi = 0; mi < sorted.length; mi++) {
      var p = sorted[mi];
      var sn = p.shop.toLowerCase();
      var isReputable = QUALITY_SHOPS.some(function(q){ return sn.includes(q); });
      var inRange = p.price >= minPrice * 1.15 && p.price <= minPrice * 1.8;
      if (isReputable && inRange && p !== cheapest && p !== quality) {
        medium = p;
        break;
      }
    }
    // If no reputable shop in range, just take middle of sorted
    if (!medium) medium = sorted[Math.floor(sorted.length / 2)];
  }

  // ── Build picks HTML ──────────────────────────────────────
  function pickCard(cssClass, lblClass, label, p) {
    if (!p) return '';
    var priceStr = '€' + p.price.toFixed(2);
    var ship = (p.shipping && p.shipping !== '—') ? p.shipping : '';
    return '<a href="' + (p.url||'#') + '" target="_blank" rel="noopener" class="pick-card ' + cssClass + '">'
      + '<span class="pick-label ' + lblClass + '">' + label + '</span>'
      + '<div class="pick-shop">'
      + '<div class="pick-shop-name">' + p.shop + '</div>'
      + (p.part ? '<div class="pick-part">' + p.part + '</div>' : '')
      + (ship ? '<div class="pick-ship">' + ship + '</div>' : '')
      + '</div>'
      + '<div class="pick-price">' + priceStr + '</div>'
      + '</a>';
  }

  var picksHtml = '<div class="picks-title">' + (LANG === 'fi' ? 'Parhaat valinnat' : 'Top picks') + '</div>'
    + pickCard('pick-cheapest', 'lbl-cheapest', LANG==='fi'?'Halvin':'Cheapest', cheapest)
    + pickCard('pick-quality',  'lbl-quality',  LANG==='fi'?'Laatu':'Quality',   quality)
    + pickCard('pick-medium',   'lbl-medium',   LANG==='fi'?'Paras vastine':'Best value', medium);

  // ── Compact remaining listings ────────────────────────────
  var shown = [cheapest, quality, medium].filter(Boolean);
  var rest = prices.filter(function(p) {
    return !shown.some(function(s){ return s && s.url === p.url; });
  });

  var restHtml = '';
  if (rest.length) {
    restHtml = '<div class="listings-title">' + (LANG==='fi'?'Kaikki tulokset':'All results') + '</div>'
      + rest.map(function(p) {
          var priceStr = p.price != null ? '€' + p.price.toFixed(2) : t('see-site');
          return '<a href="' + (p.url||'#') + '" target="_blank" rel="noopener" class="price-card-sm">'
            + '<div style="flex:1;min-width:0">'
            + '<div class="price-sm-name">' + p.shop + '</div>'
            + (p.part ? '<div class="price-sm-part">' + p.part + '</div>' : '')
            + '</div>'
            + '<div class="price-sm-price' + (p.price==null?' muted':'') + '">' + priceStr + '</div>'
            + '</a>';
        }).join('');
  }

  el.innerHTML = picksHtml + restHtml;
}

// Lightbox state
var lightboxImages = [];
var lightboxIndex = 0;

// ── Lightbox zoom & pan state ──────────────────────────────────
var lbZoom = 1, lbPanX = 0, lbPanY = 0;
var lbDragging = false, lbDidDrag = false;
var lbDragStartX = 0, lbDragStartY = 0, lbPanStartX = 0, lbPanStartY = 0;
var lbPinchStartDist = 0, lbPinchStartZoom = 1;
var lbZoomHintTimer = null;

function openLightbox(index) {
  lightboxIndex = index;
  lbResetZoom();
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  showLbZoomHint();
}

function closeLightboxEl() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  lbResetZoom();
}

function lightboxNav(dir) {
  lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length;
  lbResetZoom();
  updateLightbox();
}

function updateLightbox() {
  var item = lightboxImages[lightboxIndex];
  if (!item) return;
  document.getElementById('lightbox-img').src = item.url;
  document.getElementById('lightbox-title').textContent = item.title || '';
}

function showLbZoomHint() {
  var hint = document.getElementById('lbZoomHint');
  if (!hint) return;
  hint.textContent = LANG === 'fi' ? 'Nipistä tai vieritä zoomataksesi' : 'Pinch or scroll to zoom';
  clearTimeout(lbZoomHintTimer);
  lbZoomHintTimer = setTimeout(function(){ hint.textContent = ''; }, 2500);
}

function lbApplyTransform() {
  var img = document.getElementById('lightbox-img');
  if (!img) return;
  img.style.transform = 'translate(' + lbPanX + 'px,' + lbPanY + 'px) scale(' + lbZoom + ')';
  img.style.cursor = lbZoom > 1.02 ? 'grab' : 'zoom-in';
}

function lbResetZoom() {
  lbZoom = 1; lbPanX = 0; lbPanY = 0;
  lbApplyTransform();
}

function lbImgClick(e) {
  e.stopPropagation();
  if (lbDidDrag) { lbDidDrag = false; return; } // was a drag/pinch, not a tap
  if (lbZoom > 1.02) {
    lbResetZoom();
  } else {
    lbZoom = 2.4;
    lbApplyTransform();
  }
}

function lbTouchDistance(touches) {
  var dx = touches[0].clientX - touches[1].clientX;
  var dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

(function initLightboxZoom() {
  var img = document.getElementById('lightbox-img');
  if (!img) return;

  img.addEventListener('touchstart', function(e) {
    lbDidDrag = false;
    if (e.touches.length === 2) {
      lbPinchStartDist = lbTouchDistance(e.touches);
      lbPinchStartZoom = lbZoom;
      img.classList.add('dragging');
    } else if (e.touches.length === 1 && lbZoom > 1.02) {
      lbDragging = true;
      img.classList.add('dragging');
      lbDragStartX = e.touches[0].clientX;
      lbDragStartY = e.touches[0].clientY;
      lbPanStartX = lbPanX;
      lbPanStartY = lbPanY;
    }
  }, {passive: true});

  img.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      lbDidDrag = true;
      var dist = lbTouchDistance(e.touches);
      var scale = dist / (lbPinchStartDist || 1);
      lbZoom = Math.min(Math.max(lbPinchStartZoom * scale, 1), 4);
      lbApplyTransform();
      e.preventDefault();
    } else if (e.touches.length === 1 && lbDragging) {
      lbDidDrag = true;
      lbPanX = lbPanStartX + (e.touches[0].clientX - lbDragStartX);
      lbPanY = lbPanStartY + (e.touches[0].clientY - lbDragStartY);
      lbApplyTransform();
      e.preventDefault();
    }
  }, {passive: false});

  img.addEventListener('touchend', function() {
    lbDragging = false;
    img.classList.remove('dragging');
    if (lbZoom < 1.05) { lbZoom = 1; lbPanX = 0; lbPanY = 0; lbApplyTransform(); }
    setTimeout(function(){ lbDidDrag = false; }, 50);
  });

  // Desktop: mouse wheel zoom
  img.addEventListener('wheel', function(e) {
    e.preventDefault();
    var delta = e.deltaY < 0 ? 0.25 : -0.25;
    lbZoom = Math.min(Math.max(lbZoom + delta, 1), 4);
    if (lbZoom <= 1) { lbZoom = 1; lbPanX = 0; lbPanY = 0; }
    lbApplyTransform();
  }, {passive: false});

  // Desktop: click-drag to pan when zoomed
  img.addEventListener('mousedown', function(e) {
    if (lbZoom <= 1.02) return;
    lbDragging = true;
    lbDidDrag = false;
    img.classList.add('dragging');
    lbDragStartX = e.clientX;
    lbDragStartY = e.clientY;
    lbPanStartX = lbPanX;
    lbPanStartY = lbPanY;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!lbDragging) return;
    var moved = Math.abs(e.clientX - lbDragStartX) + Math.abs(e.clientY - lbDragStartY);
    if (moved > 3) lbDidDrag = true;
    lbPanX = lbPanStartX + (e.clientX - lbDragStartX);
    lbPanY = lbPanStartY + (e.clientY - lbDragStartY);
    lbApplyTransform();
  });
  document.addEventListener('mouseup', function() {
    lbDragging = false;
    img.classList.remove('dragging');
  });
})();

function getCosmeticIcon(category, name) {
  var low = (category + ' ' + name).toLowerCase();

  if (low.includes('lower') || low.includes('spring') || low.includes('jousi')) return '↓';
  if (low.includes('coilover') || low.includes('kierrejousi')) return '↕';
  if (low.includes('tint') || low.includes('tummennus') || low.includes('ikkuna')) return '◼';
  if (low.includes('wrap') || low.includes('foliointi')) return '🎨';
  if (low.includes('paint') || low.includes('maali') || low.includes('lakkaus')) return '🖌';
  if (low.includes('led') || low.includes('valo')) return '○';
  if (low.includes('interior') || low.includes('sisust') || low.includes('ohjauspyörä')) return '◎';

      +'<div class="cosm-icon">'+icon+'</div>'
      +'<div class="cosm-info">'
      +'<div class="cosm-name">'+item.name+'</div>'
      +'<div class="cosm-desc">'+(item.description||'')+'</div>'
      +(item.effect?'<div class="cosm-effect">'+item.effect+'</div>':'')
      +brands
      +'</div>'
      +'<div class="cosm-right">'
      +'<div class="cosm-price">~€'+(item.price_eur||'?')+'</div>'
      +(item.price_range?'<div class="cosm-range">('+item.price_range+' €)</div>':'')
      +'<div class="cosm-worth">'+stars+'</div>'
      +'</div>'
      +'</div>';
  }).join('');
}

function loadTuningLevel(level) {
  var body = document.getElementById('tuning-body');
  body.innerHTML = '<div class="tuning-loading"><div class="tuning-spinner"></div>'
    +(LANG==='fi'?'Ladataan Stage '+level+'...':'Loading Stage '+level+'...')+'</div>';
  var stockHp = tuningData && tuningData.stock_hp || 0;
  var stockTq = tuningData && tuningData.stock_torque || 0;
  var ckey = 'tl:v1:'+(tuningCar?(tuningCar.vin||tuningCar.make||''):'')+':s'+level+':'+LANG;
  try {
    var c = localStorage.getItem(ckey);
    if (c) {
      var p = JSON.parse(c);
      if (p.ts && Date.now()-p.ts < 86400000) {
        tuningLevels['s'+level] = p.data;
        renderSingleLevel(p.data, level-1);
        return;
      }
    }
  } catch(e) {}
  api('/api/tuning-level', {car:tuningCar, level:level, lang:LANG, stock_hp:stockHp, stock_torque:stockTq})
    .then(function(data) {
      tuningLevels['s'+level] = data;
      try { localStorage.setItem(ckey, JSON.stringify({ts:Date.now(),data:data})); } catch(e) {}
      renderSingleLevel(data, level-1);
    })
    .catch(function(e) {
      body.innerHTML = '<div class="empty">Error: '+e.message+'</div>';
    });
}

function renderSingleLevel(lv, idx) {
  var LV_CLASS = ['lv1','lv2','lv3'];
  var lvc = LV_CLASS[idx]||'lv1';
  var body = document.getElementById('tuning-body');
  if (!lv || lv.error) { body.innerHTML = '<div class="empty">'+(lv&&lv.error?lv.error:'Error')+'</div>'; return; }
  var html = '<div class="tuning-level"><div class="level-header '+lvc+'">'
    +'<div class="level-badge">S'+(lv.level||idx+1)+'</div>'
    +'<div class="level-info"><div class="level-name">'+(lv.name||'Stage '+(idx+1))+'</div>'
    +'<div class="level-desc">'+(lv.description||'')+'</div></div>'
    +'<div class="level-stats">'
    +(lv.total_hp?'<div class="level-hp">'+lv.total_hp+' hp</div>':'')
    +(lv.total_cost_eur?'<div class="level-cost">~€'+lv.total_cost_eur.toLocaleString()+'</div>':'')
    +'</div></div>';
  ensureArray(lv.mods).forEach(function(mod) { html += renderMod(mod); });
  html += '</div>';
  body.innerHTML = html;
  haptic('success');
}

function openTuningByVin(vin) {
  var cars = getCars();
  var car = cars.find(function(c){ return c.vin === vin; }) || currentCar || {};
  openTuning(car);
}

function openTuning(car) {
  if (!car || typeof car !== 'object') return;
  haptic('light');
  tuningCar = car;
  var modal = document.getElementById('tuning-modal');
  var title = document.getElementById('tuning-title');
  var body  = document.getElementById('tuning-body');
  title.textContent = (car.make||'') + ' ' + (car.model||'') + ' ' + (car.year||'');
  body.innerHTML = '<div class="tuning-loading"><div class="tuning-spinner"></div>' + (LANG==='fi'?'Haetaan viritystietoja...':'Fetching tuning data...') + '</div>';
  activeTuningTab = 's1';
  ['s1','s2','s3','cosm'].forEach(function(t){var el=document.getElementById('ttab-'+t);if(el)el.classList.toggle('active',t==='s1');});
  tuningData = null;
  tuningLevels = {};
  var ovEl = document.getElementById('tuning-overview');
  if (ovEl) { ovEl.style.display = 'none'; ovEl.innerHTML = ''; }
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Check localStorage cache first (survives server restarts)
  var _cacheKey = 'tuning:v2:' + (car.vin||car.make||'') + ':' + LANG;  // v2 = 3 levels
  var _cached = null;
  try {
    var _raw = localStorage.getItem(_cacheKey);
    if (_raw) {
      var _parsed = JSON.parse(_raw);
      // Cache valid for 24h
      if (_parsed.ts && (Date.now() - _parsed.ts) < 86400000) {
        _cached = _parsed.data;
      } else {
        localStorage.removeItem(_cacheKey);
      }
    }
  } catch(e) {}

  if (_cached) {
    tuningData = _cached;
    renderTuningOverview(_cached);
    loadTuningLevel(1);
  } else {
    api('/api/tuning', {car: car, lang: LANG})
      .then(function(data) {
        if (!data.error) {
          try { localStorage.setItem(_cacheKey, JSON.stringify({ts: Date.now(), data: data})); } catch(e) {}
        }
        tuningData = data;
        renderTuningOverview(data);
        loadTuningLevel(1);
      })
      .catch(function(e) {
        body.innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
      });
  }
}

function renderTuningOverview(data) {
  var ov = document.getElementById('tuning-overview');
  if (!data || data.error || (!data.stock_hp && !data.stock_torque && !data.summary)) {
    ov.style.display = 'none';
    ov.innerHTML = '';
    return;
  }
  var html = '';
  if (data.stock_hp || data.stock_torque) {
    html += '<div class="tuning-stock">'
      + (data.stock_hp ? '<div class="tuning-stat"><div class="tuning-stat-val">'+data.stock_hp+' hp</div><div class="tuning-stat-lbl">'+(LANG==='fi'?'Vakioteho':'Stock power')+'</div></div>' : '')
      + (data.stock_torque ? '<div class="tuning-stat"><div class="tuning-stat-val">'+data.stock_torque+' Nm</div><div class="tuning-stat-lbl">'+(LANG==='fi'?'Vakiovääntö':'Stock torque')+'</div></div>' : '')
      + '</div>';
  }
  if (data.summary) html += '<div class="tuning-summary">'+data.summary+'</div>';
  ov.innerHTML = html;
  ov.style.display = html ? '' : 'none';
}

// Tuning mod name -> specific search term
// Key: lowercase mod name (or part of it) from AI response
// Value: exact search term to use — be specific for performance parts
// Keyword -> specific search term mapping
// Checked in order - first match wins
// Format: [[keywords_that_trigger], 'search term to use']
var MOD_SEARCH_RULES = [
  // INTAKE / AIR
  [['cold air','kylmäilma','short ram','induction kit'],          'cold air intake induction kit'],
  [['intake manifold','imusarjakaasutin'],                         'performance intake manifold'],
  [['air intake','imuputki','intake kit'],                         'cold air intake induction kit'],
  [['performance air filter','sport air filter','urheilusuodatin','suorituskykyinen ilmansuodatin'], 'sport panel air filter upgrade'],
  [['ilmansuodatin','air filter'],                                 'sport panel air filter upgrade'],

  // EXHAUST
  [['cat-back','catback','pakoputkisto'],                         'cat-back exhaust system'],
  [['downpipe','alajohto','sport downpipe'],                      'high flow sports downpipe'],
  [['decat','de-cat','catalyst removal'],                         'decat downpipe pipe'],
  [['exhaust manifold','headers','pakosarjakaasutin'],             'performance exhaust manifold headers'],
  [['sport exhaust','performance exhaust','urheilupakoputki'],    'sports exhaust system'],
  [['pakoputki','exhaust'],                                        'sports exhaust system'],

  // SUSPENSION
  [['coilover','kierrejousi','kierrejouset','coilovers','adjustable suspension','kierrejousisetit'], 'coilover suspension kit adjustable'],
  [['lowering spring','madallus','sport spring','urheilujousi','alustajouset','laskujouset'],  'lowering springs sport'],
  [['strut brace','torque arm','etutuki'],                        'strut brace front'],
  [['sway bar','anti-roll','vakaajatanko'],                       'sport sway bar anti-roll'],
  [['shock absorber','damper','iskunvaimennin'],                   'sport shock absorber damper'],

  // BRAKES
  [['big brake','brake upgrade','jarrusarja'],                    'big brake upgrade kit'],
  [['sport brake disc','slotted','drilled','urheilulevy'],        'sport grooved slotted brake discs'],
  [['performance brake pad','sport brake pad','urheilujarrupala'],'performance sport brake pads'],
  [['brake pad','jarrupala'],                                      'performance brake pads'],
  [['brake disc','jarrulevyt'],                                    'sport brake discs'],
  [['brake caliper','jarrusatula'],                               'sport brake caliper'],

  // INTERCOOLER / COOLING
  [['front mount intercooler','fmic','välijäähdytin intercooler'],'front mount intercooler upgrade kit'],
  [['intercooler'],                                                'intercooler upgrade kit'],
  [['oil cooler','öljyjäähdytin'],                                'performance oil cooler kit'],
  [['radiator','jäähdytin'],                                      'performance radiator upgrade'],

  // TURBO / FORCED INDUCTION
  [['hybrid turbo','turbo upgrade','bigger turbo','turbocharger upgrade'], 'hybrid turbocharger upgrade'],
  [['blow-off valve','bov','dump valve'],                         'blow-off valve BOV'],

  // IGNITION / ENGINE
  [['iridium spark plug','performance spark plug','sytytystulppa','sytytystulpat'], 'iridium performance spark plugs'],
  [['spark plug','sytytystulpat'],                                'iridium spark plugs performance'],
  [['short shifter','lyhytvaihteisto'],                           'short throw shifter kit'],
  [['lightweight flywheel','kevytvauhtipyörä'],                   'lightweight flywheel performance'],
  [['performance clutch','sport clutch','urheilu kytkin'],        'performance clutch kit uprated'],
  [['clutch kit','kytkinsarja'],                                  'clutch kit performance'],

  // FUELING
  [['fuel injector','suutin'],                                    'uprated fuel injectors'],

  [['fuel pressure regulator'],                                    'adjustable fuel pressure regulator'],

  // ENGINE INTERNALS
  [['camshaft','nokkaa'],                                         'performance camshaft upgrade'],

  [['piston','mäntä'],                                            'performance pistons forged'],

  // ELECTRONICS / SENSORS
  [['wideband','lambda','oxygen sensor','lambda-anturi'],         'wideband oxygen sensor kit'],
  [['ecu remap','chip tune','obd tune','viritysohjelmisto'],      'ECU remap tuning software'],
  [['data logger','boost gauge','turbo gauge'],                   'boost pressure gauge kit'],
];

function getModSearchTerm(modName) {
  var low = (modName || '').toLowerCase();
  for (var i = 0; i < MOD_SEARCH_RULES.length; i++) {
    var keywords = MOD_SEARCH_RULES[i][0];
    var term = MOD_SEARCH_RULES[i][1];
    for (var j = 0; j < keywords.length; j++) {
      if (low.includes(keywords[j])) {
        return term;
      }
    }
  }
  // No match - return original name
  return modName;
}


function searchModPart(modName) {
  if (modName && modName.dataset) modName = modName.dataset.mod;

  // Set currentCar from tuningCar if needed
  if (!currentCar && tuningCar) {
    currentCar = tuningCar;
  }

  // Find best search term using keyword rules
  var searchTerm = getModSearchTerm(modName);

  // Build full search query
  var car = currentCar || tuningCar || {};
  var carStr = ((car.make || '') + ' ' + (car.model || '')).trim();
  var fullSearch = carStr ? searchTerm + ' ' + carStr : searchTerm;

  // Set part input silently
  var partInput = document.getElementById('part-input');
  if (partInput) partInput.value = fullSearch;

  // Show car result silently without scrolling to top
  if (currentCar) {
    document.getElementById('car-result').classList.add('show');
    document.getElementById('part-block').classList.add('show');
  }

  // Close modal AFTER setting everything up
  closeTuning();

  haptic('light');

  // Run search immediately - scroll to results when done
  runSearch(fullSearch);
}

function closeTuning() {
  document.getElementById('tuning-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function ensureArray(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v === 'string') return v.split(',').map(function(s){return s.trim();}).filter(Boolean);
  return [];
}

// ── Global renderMod (used by both renderTuning and renderSingleLevel) ──
function renderMod(mod) {
  var EFFECTS = {
    power_hp:{label:LANG==='fi'?'Teho':'Power',unit:'hp',type:'real'},
    torque_nm:{label:LANG==='fi'?'Vääntö':'Torque',unit:'Nm',type:'real'},
    handling:{label:LANG==='fi'?'Ajettavuus':'Handling',unit:'',type:'score'},
    fuel_l100km:{label:LANG==='fi'?'Kulutus':'Fuel',unit:'l/100km',type:'fuel'},
    reliability:{label:LANG==='fi'?'Luotettavuus':'Reliability',unit:'',type:'score'},
    daily_usability:{label:LANG==='fi'?'Arkikäyttö':'Daily',unit:'',type:'score'},
    power:{label:LANG==='fi'?'Teho':'Power',unit:'hp',type:'real'},
    torque:{label:LANG==='fi'?'Vääntö':'Torque',unit:'Nm',type:'real'},
    fuel_economy:{label:LANG==='fi'?'Kulutus':'Fuel',unit:'l/100km',type:'fuel'},
  };
  var CAT_CLASS = {engine:'cat-engine',suspension:'cat-suspension',exhaust:'cat-exhaust',brakes:'cat-brakes'};
  var CAT_LABEL = {engine:LANG==='fi'?'Moottori':'Engine',suspension:LANG==='fi'?'Alusta':'Suspension',exhaust:LANG==='fi'?'Pakoputki':'Exhaust',brakes:LANG==='fi'?'Jarrut':'Brakes',other:LANG==='fi'?'Muu':'Other'};
  var cat = mod.category||'other', worth = mod.worth_score||0, stars = '';
  for (var s=1;s<=5;s++) stars += '<span class="worth-star'+(s<=worth?'':' empty')+'">★</span>';
  var fx = '<div class="mod-effects">';
  Object.keys(EFFECTS).forEach(function(key){
    var eff = EFFECTS[key];
    var val = (mod.effects||{})[key];
    if (val===undefined||val===null) return;
    var num = parseFloat(val)||0, isPos, displayVal, barPct;
    if (eff.type==='real'){isPos=num>0;displayVal=(num>0?'+':'')+num+' '+eff.unit;barPct=Math.min(Math.abs(num)/50*100,100);}
    else if(eff.type==='fuel'){isPos=num<0;displayVal=(num>0?'+':'')+num+' '+eff.unit;barPct=Math.min(Math.abs(num)/2*100,100);}
    else{isPos=num>=0;displayVal=(num>0?'+':'')+num;barPct=Math.abs(num)/5*100;}
    fx+='<div class="effect-row"><span class="effect-lbl">'+eff.label+'</span><div class="effect-bar-wrap"><div class="effect-bar '+(isPos?'pos':'neg')+'" style="width:'+barPct+'%"></div></div><span class="effect-val" style="color:'+(isPos?'var(--green)':'var(--red)')+'">'+displayVal+'</span></div>';
  });
  fx += '</div>';
  return '<div class="mod-card">'
    +'<div class="mod-header"><span class="mod-cat '+(CAT_CLASS[cat]||'cat-other')+'">'+(CAT_LABEL[cat]||cat)+'</span><div class="mod-name">'+mod.name+'</div><div class="mod-worth">'+stars+'</div></div>'
    +'<div class="mod-desc">'+(mod.description||'')+'</div>'
    +(mod.hp_gain||mod.torque_gain?'<div class="mod-gains">'+(mod.hp_gain?'<div class="gain-box"><div class="gain-val">+'+mod.hp_gain+' hp</div><div class="gain-lbl">'+(LANG==="fi"?"lisäteho":"power gain")+'</div></div>':'')+(mod.torque_gain?'<div class="gain-box"><div class="gain-val">+'+mod.torque_gain+' Nm</div><div class="gain-lbl">'+(LANG==="fi"?"lisävääntö":"torque gain")+'</div></div>':'')+'</div>':'')
    +fx
    +'<div class="mod-footer"><div><div class="mod-price">~€'+(mod.price_eur||'?')+'</div>'+(mod.price_range?'<div class="mod-price-range">('+mod.price_range+' €)</div>':'')+'</div>'
    +'<span class="mod-badge">'+(mod.reversible?(LANG==='fi'?'Palautettavissa':'Reversible'):(LANG==='fi'?'Pysyvä':'Permanent'))+'</span>'
    +'<span class="mod-badge">'+(mod.difficulty||'')+'</span></div>'
    +(mod.notes?'<div class="mod-notes">'+mod.notes+'</div>':'')
    +(mod.requires&&mod.requires.length?(Array.isArray(mod.requires)?'<div class="mod-notes">⚠ '+(LANG==='fi'?'Vaatii: ':'Requires: ')+mod.requires.join(', ')+'</div>':'<div class="mod-notes">⚠ '+(LANG==='fi'?'Vaatii: ':'Requires: ')+mod.requires+'</div>'):'')
    +'<button class="mod-search-btn" onclick="searchModPart(this.dataset.mod)" data-mod="'+(mod.name||'').replace(/"/g,"&quot;")+'">'
    +(LANG==="fi"?"Hae osa":"Search Part")
    +'</button></div>';
}


// ── Hourly rotating background photo ─────────────────────────
// Real vintage car/garage photography, free to use under the Unsplash License.
var BG_PHOTOS = [
  { url: 'https://images.unsplash.com/photo-1741085119770-76054898ead2', credit: 'Haberdoedas / Unsplash' },
  { url: 'https://images.unsplash.com/photo-1591278169757-deac26e49555', credit: 'Egor Vikhrev / Unsplash' },
  { url: 'https://images.unsplash.com/photo-1695580401584-5add1b53a851', credit: 'David Valentine / Unsplash' },
  { url: 'https://images.unsplash.com/photo-1750712344751-9161bb793b0f', credit: 'Luke Miller / Unsplash' },
];

function applyHourlyBackground() {
  var hourIndex = Math.floor(Date.now() / 3600000) % BG_PHOTOS.length;
  var photo = BG_PHOTOS[hourIndex];
  var layer = document.getElementById('bg-photo');
  var creditEl = document.getElementById('bg-credit');
  if (!layer) return;
  var sizedUrl = photo.url + '?w=1600&q=70&fm=jpg&fit=crop&auto=format';
  // Preload before swapping in, so we never flash a half-loaded image
  var img = new Image();
  img.onload = function() {
    layer.style.backgroundImage = "url('" + sizedUrl + "')";
    layer.classList.add('loaded');
  };
  img.src = sizedUrl;
  if (creditEl) creditEl.textContent = photo.credit;
}

applyHourlyBackground();
// Re-check periodically in case the tab stays open across an hour boundary
setInterval(applyHourlyBackground, 5 * 60 * 1000);

// ── Init ───────────────────────────────────────────────────────
applyLang();
renderCars();
